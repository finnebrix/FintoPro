<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finto Pro · GST Billing for Professionals</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<style>
:root{
  --ink:#0f2e2b;          /* deep practice teal */
  --ink-2:#1c4a45;
  --paper:#eef6f4;        /* soft app background */
  --card:#f6fbf9;
  --line:#c0ddd8;
  --line-2:#d8ede9;
  --muted:#3d756e;
  --text:#0f2e2b;
  --brand:#0e7c70;        /* primary action teal */
  --brand-d:#0a655b;
  --accent:#c2841b;       /* warm brass/gold accent */
  --green:#0f8f6a;
  --green-bg:#e4f4ee;
  --red:#cc3a4e;
  --red-bg:#fbe9ec;
  --amber-bg:#fbf1de;
  --shadow:0 1px 2px rgba(15,46,43,.06), 0 6px 24px rgba(15,46,43,.07);
  --r:12px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
  background:var(--paper);color:var(--text);font-size:14px;line-height:1.45;
  -webkit-font-smoothing:antialiased;
}
.num{font-variant-numeric:tabular-nums}
h1,h2,h3,h4{margin:0;color:var(--ink);font-weight:700;letter-spacing:-.01em}
a{color:var(--brand);text-decoration:none}
button{font-family:inherit}
input,select,textarea{font-family:inherit;font-size:14px}

/* ---------- App shell ---------- */
.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
.side{
  background:var(--ink);color:#cfe3de;padding:18px 14px;position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;gap:6px;
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:none;
}
.side::-webkit-scrollbar{display:none;}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
.brand .logo{
  width:34px;height:34px;border-radius:9px;display:grid;place-items:center;
  background:linear-gradient(140deg,var(--brand),#1aa896);color:#fff;font-weight:800;font-size:17px;
  box-shadow:0 4px 12px rgba(14,124,112,.45);
}
/* fp-logo overrides the old .logo inside .brand — keep dimensions consistent */
.brand .fp-logo{ background:linear-gradient(145deg,#0f1c40,#132050) !important; }
.brand b{color:#fff;font-size:16px;letter-spacing:-.02em;display:block;line-height:1.1}
.brand span{font-size:11px;color:#86a39c}
.nav{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.nav button{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:0;cursor:pointer;
  background:transparent;color:#a6c0ba;padding:10px 11px;border-radius:9px;font-size:14px;font-weight:600;
  transition:.15s;
}
.nav button .ic{width:18px;height:18px;flex:none;opacity:.85}
.nav button:hover{background:rgba(255,255,255,.06);color:#fff}
.nav button.on{background:var(--brand);color:#fff;box-shadow:0 4px 12px rgba(14,124,112,.4)}
.side .foot{margin-top:auto;font-size:11px;color:#7a948d;padding:8px}
.side .foot button{background:rgba(255,255,255,.07);color:#cfe3de;border:0;padding:8px;border-radius:8px;width:100%;cursor:pointer;margin-bottom:6px;font-weight:600}
.side .foot button:hover{background:rgba(255,255,255,.13)}

.main{padding:22px 26px 60px;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.topbar .h{display:flex;flex-direction:column}
.topbar h1{font-size:22px}
.topbar p{margin:2px 0 0;color:var(--muted);font-size:13px}

/* ---------- Reusable ---------- */
.btn{
  display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--text);
  padding:9px 14px;border-radius:9px;font-weight:600;font-size:13.5px;cursor:pointer;transition:.15s;white-space:nowrap;
}
.btn:hover{border-color:#c8d2e6;background:#fbfcfe}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.primary:hover{background:var(--brand-d);border-color:var(--brand-d)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.ghost:hover{background:#eef2f8;color:var(--text)}
.btn.danger{color:var(--red);border-color:#f0c7ce}
.btn.danger:hover{background:var(--red-bg)}
.btn.sm{padding:6px 10px;font-size:12.5px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.pad{padding:18px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.grid{display:grid;gap:14px}
.field{display:flex;flex-direction:column;gap:5px;min-width:0}
.field label{font-size:12px;font-weight:600;color:var(--muted)}
.field input,.field select,.field textarea{
  border:1px solid var(--line);border-radius:8px;padding:9px 11px;background:#fff;color:var(--text);outline:none;transition:.15s;width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(14,124,112,.13)}
.field .hint{font-size:11px;color:var(--muted)}
.field .err{font-size:11px;color:var(--red);font-weight:600}
.field input.bad{border-color:var(--red);background:#fff7f8}
.field input.good{border-color:var(--green)}
.sectit{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:0 0 10px}

table{width:100%;border-collapse:collapse}
th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);text-align:left;font-weight:700;padding:11px 12px;border-bottom:1px solid var(--line)}
td{padding:11px 12px;border-bottom:1px solid var(--line-2);vertical-align:middle}
tbody tr:hover{background:#fafbfe}
.t-r{text-align:right}
.t-c{text-align:center}
.tag{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700}
.tag.green{background:var(--green-bg);color:var(--green)}
.tag.red{background:var(--red-bg);color:var(--red)}
.tag.amber{background:var(--amber-bg);color:var(--accent)}
.tag.grey{background:#eef1f7;color:var(--muted)}
.empty{text-align:center;color:var(--muted);padding:40px 16px}
.empty .big{font-size:30px;margin-bottom:8px}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.kpi .lbl{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px}
.kpi .val{font-size:23px;font-weight:800;color:var(--ink);margin-top:7px}
.kpi .sub{font-size:11.5px;color:var(--muted);margin-top:3px}
.dot{width:9px;height:9px;border-radius:3px;flex:none}

/* charts */
.charts{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-top:14px}
.chartbox{height:280px}
.chartbox canvas{max-height:230px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(16,24,40,.5);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:30px 16px;overflow:auto}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;box-shadow:0 24px 60px rgba(16,24,40,.3)}
.modal.wide{max-width:920px}
.modal .mhead{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
.modal .mhead h3{font-size:17px}
.modal .mbody{padding:20px}
.modal .mfoot{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.x{border:0;background:transparent;font-size:20px;color:var(--muted);cursor:pointer;line-height:1;padding:4px 8px;border-radius:8px}
.x:hover{background:#eef2f8}

/* item table editor */
.items{overflow:auto;border:1px solid var(--line);border-radius:10px}
.items table{min-width:880px}
.items input,.items select{border:1px solid transparent;background:transparent;border-radius:6px;padding:7px 8px}
.items td{padding:4px 6px;border-bottom:1px solid var(--line-2)}
.items input:focus,.items select:focus{border-color:var(--brand);background:#fff}
.items .delrow{color:var(--red);border:0;background:transparent;cursor:pointer;font-size:16px;padding:4px 8px;border-radius:6px}
.items .delrow:hover{background:var(--red-bg)}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.search{flex:1;min-width:200px;position:relative}
.search input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--line);border-radius:9px;background:#fff}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.5}

.totals{display:grid;grid-template-columns:1fr;gap:6px;max-width:340px;margin-left:auto}
.totals .l{display:flex;justify-content:space-between;font-size:13.5px;color:var(--muted);padding:3px 0}
.totals .l b{color:var(--text);font-weight:600}
.totals .grand{border-top:2px solid var(--ink);margin-top:6px;padding-top:9px;font-size:18px}
.totals .grand b{font-weight:800;color:var(--ink)}

.tabs{display:flex;gap:4px;background:#eef2f8;padding:4px;border-radius:10px;width:fit-content;margin-bottom:16px;flex-wrap:wrap}
.tabs button{border:0;background:transparent;padding:8px 14px;border-radius:7px;font-weight:600;color:var(--muted);cursor:pointer;font-size:13px}
.tabs button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;transition:.25s;z-index:80;pointer-events:none;font-size:13.5px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------------- Invoice print templates ---------------- */
#print-root{position:absolute;left:-99999px;top:0}
.inv{width:780px;background:#fff;color:#222;padding:34px;font-size:13px;margin:0 auto}
.inv *{box-sizing:border-box}
.inv .ihead{display:flex;justify-content:space-between;gap:20px;align-items:flex-start}
.inv .biz h2{font-size:21px;margin-bottom:3px}
.inv .biz p{margin:1px 0;font-size:12px;color:#444}
.inv .title{text-align:right}
.inv .title h1{font-size:24px;letter-spacing:1px}
.inv .title .meta{font-size:12px;color:#444;margin-top:8px}
.inv .title .meta div{margin:2px 0}
.inv .parties{display:flex;gap:18px;margin:22px 0 16px}
.inv .pbox{flex:1;border:1px solid #ddd;border-radius:8px;padding:12px}
.inv .pbox .lab{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#888;font-weight:700;margin-bottom:5px}
.inv .pbox b{font-size:14px}
.inv .pbox p{margin:2px 0;font-size:12px;color:#444}
.inv table.it{width:100%;border-collapse:collapse;margin-top:6px}
.inv table.it th{background:#f3f5f9;color:#333;font-size:10.5px;padding:8px 7px;border:1px solid #e2e6ee;text-align:left;text-transform:uppercase;letter-spacing:.03em}
.inv table.it td{padding:7px;border:1px solid #eceff5;font-size:12px}
.inv .sumwrap{display:flex;justify-content:space-between;gap:24px;margin-top:16px}
.inv .words{flex:1;font-size:12px}
.inv .words .lab{font-size:10px;text-transform:uppercase;color:#888;font-weight:700;letter-spacing:.06em}
.inv .stot{width:300px}
.inv .stot .l{display:flex;justify-content:space-between;padding:4px 0;font-size:12.5px;color:#444}
.inv .stot .g{border-top:2px solid #333;margin-top:5px;padding-top:7px;font-weight:800;font-size:15px;color:#111}
.inv .foot{display:flex;justify-content:space-between;margin-top:34px;gap:20px}
.inv .terms{font-size:11px;color:#666;flex:1}
.inv .sign{text-align:right;font-size:12px;color:#444}
.inv .sign .sp{height:46px}
.inv .accent{color:#0e7c70}
.inv .gstsplit{font-size:11px;color:#666;margin-top:4px}
/* UPI QR block */
.inv .upi-qr{display:flex;align-items:flex-start;gap:14px;margin-top:13px;padding:11px 13px;
  border:1px solid #e2e8f5;border-radius:8px;background:#f8faff}
.inv .upi-qr svg{width:88px;height:88px;flex:none;border:1px solid #e0e6f0;border-radius:4px;
  background:#fff;padding:3px}
.inv .upi-qr .qr-info{font-size:11px;color:#555}
.inv .upi-qr .qr-info .qr-title{font-size:12.5px;font-weight:800;color:#222;margin-bottom:3px}
.inv .upi-qr .qr-info .qr-upi{font-size:11px;color:#1665c0;font-weight:600;margin-bottom:5px}
.inv .upi-qr .qr-info .qr-scan{font-size:10.5px;color:#888;margin-top:2px}

/* Template: Classic */
.tpl-classic{border:2px solid #0f2e2b}
.tpl-classic .title h1{color:#0f2e2b}
.tpl-classic table.it th{background:#0f2e2b;color:#fff;border-color:#0f2e2b}

/* Template: Tally */
.tpl-tally{font-family:"Courier New",monospace;border:1px solid #000;padding:26px}
.tpl-tally .ihead{border-bottom:2px solid #000;padding-bottom:12px}
.tpl-tally .title h1{font-family:inherit;font-size:20px}
.tpl-tally table.it th{background:#fff;color:#000;border:1px solid #000;font-family:inherit}
.tpl-tally table.it td{border:1px solid #000}
.tpl-tally .pbox{border-color:#000;border-radius:0}
.tpl-tally .accent{color:#000}

/* Template: Modern */
.tpl-modern{border-radius:0}
.tpl-modern .ihead{background:linear-gradient(120deg,#0e7c70,#1aa896);color:#fff;margin:-34px -34px 22px;padding:30px 34px;border-radius:0}
.tpl-modern .ihead h2,.tpl-modern .ihead h1{color:#fff}
.tpl-modern .ihead p{color:#dbe4fb}
.tpl-modern .title .meta{color:#dbe4fb}
.tpl-modern table.it th{background:#e6f5f2;color:#0e7c70;border-color:#cfe9e3}
.tpl-modern .pbox{border-color:#dde6fb;background:#f7f9ff}

/* Template: Corporate */
.tpl-corporate{border-top:6px solid #e0922f}
.tpl-corporate .title h1{color:#e0922f}
.tpl-corporate table.it th{background:#fbf3e7;color:#8a5a16;border-color:#f0e0c6}
.tpl-corporate .accent{color:#e0922f}
.tpl-corporate .stot .g{border-color:#e0922f}

/* Template: Minimal */
.tpl-minimal{padding:40px}
.tpl-minimal table.it th{background:#fff;border:0;border-bottom:2px solid #111;color:#111;padding-left:0}
.tpl-minimal table.it td{border:0;border-bottom:1px solid #eee;padding-left:0}
.tpl-minimal .pbox{border:0;padding:0}
.tpl-minimal .ihead{border-bottom:1px solid #eee;padding-bottom:18px}

/* ---- HSN / SAC Tax Breakup Table ---- */
.inv .brkup{margin:14px 0;border-top:1.5px solid #e0e6f0;padding-top:12px}
.inv .brkup-label{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;
  color:#444;display:inline-block;padding:3px 10px 3px 8px;margin-bottom:8px;
  background:#f3f5fa;border-left:3px solid #0e7c70;border-radius:0 4px 4px 0}
.inv .brkup-table{width:100%;border-collapse:collapse;font-size:11.5px}
.inv .brkup-table th{background:#eef2fb;color:#2a3a6a;padding:5px 8px;border:1px solid #dde3ef;
  text-align:left;font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.04em}
.inv .brkup-table td{padding:5px 8px;border:1px solid #eceff5;font-size:12px}
.inv .brkup-table tfoot td{background:#eef2fb;font-weight:800;border-top:2px solid #c0c8df}
.inv .brkup-table .t-r{text-align:right}
.inv .brkup-table .t-c{text-align:center}

/* Template 6: Saffron Split */
.tpl-saffron .ihead{background:linear-gradient(135deg,#b45309,#d97706,#f59e0b);
  color:#fff;margin:-34px -34px 22px;padding:30px 34px;border-radius:0}
.tpl-saffron .biz h2{color:#fff;font-size:20px}
.tpl-saffron .biz p{color:#fde68a}
.tpl-saffron .title h1{color:#fff;letter-spacing:2px;text-shadow:0 1px 6px rgba(0,0,0,.25)}
.tpl-saffron .title .meta{color:#fde68a}
.tpl-saffron table.it th{background:#fef3c7;color:#92400e;border-color:#fcd34d;font-weight:800}
.tpl-saffron table.it td{border-color:#fef3c7}
.tpl-saffron .pbox{border-color:#fcd34d;background:#fffbf0}
.tpl-saffron .stot .g{border-color:#d97706;color:#78350f}
.tpl-saffron .accent{color:#d97706}
.tpl-saffron .foot{border-top:3px solid #f59e0b;margin-top:24px}
.tpl-saffron .brkup{border-top-color:#fcd34d}
.tpl-saffron .brkup-label{background:#fef3c7;color:#92400e;border-left-color:#d97706}
.tpl-saffron .brkup-table th{background:#fef3c7;color:#92400e;border-color:#fcd34d}
.tpl-saffron .brkup-table tfoot td{background:#fef3c7;border-top-color:#fcd34d}

/* Template 7: Deep Navy */
.tpl-navy .ihead{background:linear-gradient(135deg,#07111f,#0c2240,#143261);
  color:#fff;margin:-34px -34px 22px;padding:30px 34px;border-radius:0}
.tpl-navy .biz h2{color:#fff;font-size:20px}
.tpl-navy .biz p{color:#7ab0d8}
.tpl-navy .title h1{color:#5ab8f8;letter-spacing:3px;font-size:20px;font-weight:900}
.tpl-navy .title .meta{color:#7ab0d8}
.tpl-navy table.it th{background:#0c2240;color:#fff;border-color:#1a3f6e}
.tpl-navy table.it td{border-color:#e4eef7}
.tpl-navy .pbox{border-color:#b8d6ee;background:#f0f8ff}
.tpl-navy .stot .g{border-color:#0c2240;color:#07111f}
.tpl-navy .accent{color:#1665c0}
.tpl-navy .foot{border-top:2px solid #0c2240;margin-top:28px}
.tpl-navy .brkup{border-top-color:#b8d6ee}
.tpl-navy .brkup-label{background:#e8f4fd;color:#07111f;border-left-color:#0c2240}
.tpl-navy .brkup-table th{background:#0c2240;color:#fff;border-color:#1a3f6e}
.tpl-navy .brkup-table tfoot td{background:#e8f4fd;border-top-color:#b8d6ee}

/* Template 8: Emerald Gold */
.tpl-emerald .ihead{background:linear-gradient(135deg,#022c16,#14532d,#15803d);
  color:#fff;margin:-34px -34px 22px;padding:30px 34px;border-radius:0}
.tpl-emerald .biz h2{color:#fff;font-size:20px}
.tpl-emerald .biz p{color:#6ee7a4}
.tpl-emerald .title h1{color:#d4a853;letter-spacing:2px;font-size:21px;
  text-shadow:0 1px 8px rgba(0,0,0,.4)}
.tpl-emerald .title .meta{color:#6ee7a4}
.tpl-emerald table.it th{background:#14532d;color:#fff;border-color:#15803d}
.tpl-emerald table.it td{border-color:#dcfce7}
.tpl-emerald .pbox{border-color:#86efac;background:#f0fdf4}
.tpl-emerald .stot .g{border-color:#d4a853;color:#022c16;border-top-width:2px}
.tpl-emerald .accent{color:#d4a853}
.tpl-emerald .foot{border-top:2px solid #d4a853;margin-top:28px}
.tpl-emerald .brkup{border-top-color:#86efac}
.tpl-emerald .brkup-label{background:#f0fdf4;color:#14532d;border-left-color:#d4a853}
.tpl-emerald .brkup-table th{background:#14532d;color:#fff;border-color:#15803d}
.tpl-emerald .brkup-table tfoot td{background:#f0fdf4;border-top-color:#86efac}

/* ========= Parchi / Quick Receipt ========= */
.parchi{
  width:390px;max-width:100%;margin:0 auto;background:#fff;color:#111;
  font-family:'Courier New',Courier,monospace;font-size:12.5px;padding:20px 18px;
  border:1px solid #ccc;box-shadow:0 2px 12px rgba(0,0,0,.15);
}
.parchi .ph{text-align:center;border-bottom:2px solid #111;padding-bottom:10px;margin-bottom:12px}
.parchi .ph h2{font-size:16px;font-weight:900;margin:0 0 3px;text-transform:uppercase;letter-spacing:.5px}
.parchi .ph p{font-size:11px;margin:2px 0;line-height:1.5}
.parchi .pinvtitle{text-align:center;font-weight:900;font-size:14px;letter-spacing:3px;
  margin-bottom:10px;border-bottom:1px dashed #666;padding-bottom:8px}
.parchi .pm{font-size:12px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px dashed #aaa}
.parchi .pm div{margin:2px 0;line-height:1.5}
.parchi table.pit{width:100%;border-collapse:collapse;font-size:11.5px}
.parchi table.pit th{font-weight:900;border-bottom:1px dashed #555;border-top:1px dashed #555;
  padding:5px 3px;text-align:left;white-space:nowrap}
.parchi table.pit td{padding:3px 3px;vertical-align:top}
.parchi table.pit .sub{font-size:10px;color:#555;padding-top:0;padding-left:12px}
.parchi table.pit .t-r{text-align:right}
.parchi table.pit tr:last-child td{border-top:1px dashed #aaa;font-weight:900;padding-top:5px}
.parchi .psummary{border-top:1px dashed #555;padding-top:7px;margin-top:4px;font-size:12px}
.parchi .psummary .pl{display:flex;justify-content:space-between;padding:2px 0}
.parchi .psummary .pl.bold{font-weight:900;font-size:13px;border-top:1px dashed #555;
  margin-top:4px;padding-top:5px}
.parchi .psummary .pl.saved{color:#16a34a;font-size:11.5px}
.parchi .pnotes{border-top:1px dashed #aaa;margin-top:10px;padding-top:8px;font-size:11.5px}
.parchi .pfoot{text-align:center;border-top:2px solid #111;margin-top:12px;
  padding-top:8px;font-size:12px;font-weight:700;letter-spacing:.5px}
/* ========= iOS-style Link-to-Ledger Toggle ========= */
.lk-toggle{display:inline-flex;align-items:center;gap:10px;cursor:pointer;
  user-select:none;font-weight:600;font-size:13.5px;color:var(--text)}
.lk-track{position:relative;width:64px;height:32px;border-radius:16px;
  background:#16a34a;transition:background .25s;flex:none;
  border:2.5px solid rgba(255,255,255,.28);
  box-shadow:inset 0 2px 5px rgba(0,0,0,.2),0 2px 10px rgba(22,163,74,.4)}
.lk-icon-on,.lk-icon-off{position:absolute;top:50%;transform:translateY(-50%);
  font-size:14px;font-weight:900;color:#fff;transition:opacity .2s;
  text-shadow:0 1px 3px rgba(0,0,0,.25);line-height:1}
.lk-icon-on{left:7px;opacity:1}
.lk-icon-off{right:7px;opacity:0}
.lk-knob{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;
  background:#fff;transition:right .25s;z-index:1;
  box-shadow:0 2px 7px rgba(0,0,0,.35),0 0 0 1px rgba(0,0,0,.08)}
.lk-toggle.off .lk-track{background:#dc2626;box-shadow:inset 0 2px 5px rgba(0,0,0,.2),0 2px 10px rgba(220,38,38,.35)}
.lk-toggle.off .lk-knob{right:calc(100% - 25px)}
.lk-toggle.off .lk-icon-on{opacity:0}
.lk-toggle.off .lk-icon-off{opacity:1}
.lk-on-txt{display:inline}.lk-off-txt{display:none}
.lk-toggle.off .lk-on-txt{display:none}.lk-toggle.off .lk-off-txt{display:inline}

/* ============================================================
   DARK MODE
   ============================================================ */
body.dark{
  --ink:#dce8ff;
  --ink-2:#b8ccf0;
  --paper:#08211e;
  --card:#0f2e2a;
  --line:#1f4a44;
  --line-2:#163a35;
  --muted:#7f968f;
  --text:#bfd6cf;
  --brand:#1ab39f;
  --brand-d:#149a89;
  --green:#22c997;
  --green-bg:#07322a;
  --red:#f4566e;
  --red-bg:#3c0d1a;
  --amber-bg:#3a2a00;
  --shadow:0 1px 3px rgba(0,0,0,.6),0 6px 28px rgba(0,0,0,.5);
}
/* Sidebar stays dark teal regardless of mode */
body.dark .side{background:#06201d;}
/* Inputs / selects / textareas */
body.dark .field input,
body.dark .field select,
body.dark .field textarea{background:#0c2723;color:var(--text);border-color:var(--line);}
body.dark .field input:focus,
body.dark .field select:focus,
body.dark .field textarea:focus{background:#103029;border-color:var(--brand);box-shadow:0 0 0 3px rgba(26,179,159,.18);}
body.dark .field input.bad{background:#2a0d18;border-color:var(--red);}
body.dark .field input.good{border-color:var(--green);}
body.dark input[type=date]{color-scheme:dark;}
/* Search bar */
body.dark .search input{background:#0c2723;color:var(--text);border-color:var(--line);}
/* Item table inline inputs */
body.dark .items{border-color:var(--line);}
body.dark .items input,
body.dark .items select{color:var(--text);}
body.dark .items input:focus,
body.dark .items select:focus{background:#103029;border-color:var(--brand);}
body.dark .items td{border-color:var(--line-2);}
/* Tables */
body.dark th{border-color:var(--line);}
body.dark td{border-color:var(--line-2);}
body.dark tbody tr:hover{background:rgba(26,179,159,.06);}
/* Cards */
body.dark .card{background:var(--card);border-color:var(--line);}
/* Buttons */
body.dark .btn{background:#123330;color:var(--text);border-color:var(--line);}
body.dark .btn:hover{background:#17433d;border-color:#2c6b62;}
body.dark .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff;}
body.dark .btn.primary:hover{background:var(--brand-d);border-color:var(--brand-d);}
body.dark .btn.ghost{background:transparent;border-color:transparent;color:var(--muted);}
body.dark .btn.ghost:hover{background:rgba(26,179,159,.1);color:var(--text);}
body.dark .btn.danger{color:var(--red);border-color:#5a1825;}
body.dark .btn.danger:hover{background:var(--red-bg);}
/* Modal */
body.dark .modal{background:#0f2e2a;}
body.dark .modal .mhead{border-color:var(--line);}
body.dark .modal .mfoot{border-color:var(--line);}
/* Tabs */
body.dark .tabs{background:#06201d;}
body.dark .tabs button.on{background:var(--card);color:var(--ink);}
/* Tags */
body.dark .tag.grey{background:#15403a;color:var(--muted);}
/* KPI */
body.dark .kpi{background:var(--card);border-color:var(--line);}
/* Totals */
body.dark .totals .grand{border-top-color:var(--ink);}
/* X close button */
body.dark .x{color:var(--muted);}
body.dark .x:hover{background:rgba(255,255,255,.08);}
/* Theme toggle button */
.theme-toggle{font-size:16px;padding:8px 11px;border-radius:9px;line-height:1;}
/* Invoice preview wrapper — stays light (it's for printing) */
body.dark .inv-wrap{background:#0d2a26 !important;}
body.dark .inv{background:#fff !important;color:#222 !important;}

.tag.purple{background:#f0e8fb;color:#6030b0}

.doctype-pill.quote{background:#e8f4ff;color:#1665c0;border:1.5px solid #b8d6f5}
.doctype-pill.challan{background:#fff3e0;color:#c45800;border:1.5px solid #ffcc80}
.doctype-pill.proforma{background:#f3e5ff;color:#7c3aed;border:1.5px solid #d8b4fe}

.doctype-pill.credit-note{background:#fce4ed;color:#c00040;border:1.5px solid #f9a8c9}
.doctype-pill.debit-note{background:#fdf3e0;color:#a05000;border:1.5px solid #ffd080}
.overdue-badge{display:inline-flex;align-items:center;gap:5px;background:#fce4ed;color:#c00040;padding:3px 9px;border-radius:8px;font-size:11.5px;font-weight:700}
#lockScreen{position:fixed;inset:0;background:#08211e;z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#lockScreen.show{display:flex}
#lockScreen h2{color:#fff;font-size:22px;margin:0}
#lockScreen p{color:#7f968f;font-size:13px;margin:0}
#lockScreen input{padding:14px 18px;border-radius:10px;border:2px solid #1f4a44;background:#0f2e2a;color:#fff;font-size:22px;letter-spacing:6px;text-align:center;width:200px;outline:none}
#lockScreen input:focus{border-color:#1ab39f}
#lockScreen .lock-err{color:#f4566e;font-size:12px;font-weight:600;min-height:16px}
#lockScreen .logo-big{width:56px;height:56px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(140deg,#0e7c70,#1aa896);color:#fff;font-weight:900;font-size:28px;box-shadow:0 6px 24px rgba(14,124,112,.5);display:none}

#lockScreen .fp-logo-big{display:grid}
.fin-section{margin-bottom:20px}
.fin-section .fin-hd{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:8px 14px;background:var(--paper);border-radius:8px;margin-bottom:2px}
.fin-row{display:flex;justify-content:space-between;padding:7px 14px;border-bottom:1px solid var(--line-2);font-size:13.5px}
.fin-row.total{font-weight:800;border-top:2px solid var(--ink);border-bottom:none;font-size:15px;padding-top:10px}
.fin-row.sub{color:var(--muted);font-size:12.5px;padding-left:28px}
@keyframes bell-shake{0%,100%{transform:rotate(0)}15%{transform:rotate(15deg)}30%{transform:rotate(-12deg)}45%{transform:rotate(8deg)}60%{transform:rotate(-5deg)}75%{transform:rotate(3deg)}}
.bell-shake{animation:bell-shake .6s ease}
.scan-active{border-color:var(--brand)!important;box-shadow:0 0 0 3px rgba(14,124,112,.25)!important;background:#e9f6f3!important}
/* Recurring badge */
.tag.recur{background:#e4f4ee;color:#0e7c70}
/* Trial Balance */
.tb-row-credit{color:var(--green);font-weight:600}
.tb-row-debit{color:var(--red);font-weight:600}
/* Quick action bar */
.qa-bar{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.qa{display:flex;align-items:center;gap:9px;border:1px solid var(--line);background:var(--card);color:var(--text);
  padding:13px 14px;border-radius:11px;font-weight:700;font-size:13.5px;cursor:pointer;transition:.15s;box-shadow:var(--shadow)}
.qa span{font-size:18px;width:34px;height:34px;display:grid;place-items:center;border-radius:9px;background:var(--paper)}
.qa:hover{border-color:var(--brand);transform:translateY(-2px)}
/* Theme swatches */
.theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.theme-card{border:2px solid var(--line);border-radius:12px;padding:12px;cursor:pointer;transition:.15s;background:var(--card)}
.theme-card:hover{border-color:var(--brand)}
.theme-card.on{border-color:var(--brand);box-shadow:0 0 0 3px var(--glowA,rgba(37,99,235,.18))}
.theme-card .sw{height:36px;border-radius:8px;margin-bottom:8px;display:flex;overflow:hidden}
.theme-card .sw i{flex:1}
.theme-card .nm{font-size:12.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;justify-content:space-between}
/* Big GST switch */
.gst-switch{display:inline-flex;align-items:center;gap:12px;padding:10px 16px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);cursor:pointer;user-select:none}
.gst-switch .track{width:54px;height:28px;border-radius:14px;background:var(--green);position:relative;transition:.2s;flex:none}
.gst-switch .knob{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.gst-switch.off .track{background:#9aa8b5}
.gst-switch.off .knob{left:calc(100% - 25px)}
.gst-switch .lbl b{color:var(--ink)}
.gst-switch .lbl .st{font-size:11px;color:var(--muted)}
/* Report hub list */
.rep-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.rep-item{border:1px solid var(--line);border-radius:11px;padding:13px 15px;background:var(--card);cursor:pointer;transition:.15s;box-shadow:var(--shadow)}
.rep-item:hover{border-color:var(--brand);transform:translateY(-2px)}
.rep-item .ti{font-weight:700;color:var(--ink);font-size:14px;display:flex;align-items:center;gap:8px}
.rep-item .ds{font-size:11.5px;color:var(--muted);margin-top:3px}

/* =====================================================================
   FINTO PRO — Animated F+Gear Logo
   ===================================================================== */
@keyframes fpGearSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fpNeonSweep{
  0%  {stroke-dashoffset:800;opacity:.5}
  40% {opacity:1}
  100%{stroke-dashoffset:0;opacity:.9}
}
@keyframes fpNeonPulse{
  0%,100%{filter:drop-shadow(0 0 4px #38d0f0) drop-shadow(0 0 10px #1ab4e8)}
  50%    {filter:drop-shadow(0 0 8px #38d0f0) drop-shadow(0 0 22px #0fd8ff) drop-shadow(0 0 40px #06b9e8)}
}
@keyframes fpLogoFloat{
  0%,100%{transform:translateY(0)}
  50%    {transform:translateY(-2px)}
}
@keyframes fpGlowRing{
  0%,100%{box-shadow:0 0 0 0 rgba(56,208,240,.0), 0 4px 18px rgba(37,99,235,.55)}
  50%    {box-shadow:0 0 0 4px rgba(56,208,240,.25), 0 6px 28px rgba(37,99,235,.75)}
}

/* Sidebar compact logo box */
.fp-logo{
  width:36px;height:36px;border-radius:10px;flex:none;
  background:linear-gradient(145deg,#0f1c40,#132050);
  display:grid;place-items:center;
  animation:fpGlowRing 3s ease-in-out infinite, fpLogoFloat 4s ease-in-out infinite;
  overflow:visible;position:relative;
}
.fp-logo svg{width:26px;height:26px;overflow:visible}
/* the gear path gets the spin */
.fp-gear{transform-origin:62% 72%;animation:fpGearSpin 6s linear infinite}
/* the F outline neon stroke */
.fp-neon{
  fill:none;stroke:#38d0f0;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:800;stroke-dashoffset:0;
  animation:fpNeonPulse 3s ease-in-out infinite;
}

/* Large lock-screen logo */
.fp-logo-big{
  width:72px;height:72px;border-radius:18px;
  background:linear-gradient(145deg,#0c1838,#14235a);
  display:grid;place-items:center;
  animation:fpGlowRing 3s ease-in-out infinite, fpLogoFloat 4s ease-in-out infinite;
  margin:0 auto 10px;overflow:visible;
}
.fp-logo-big svg{width:50px;height:50px;overflow:visible}
.fp-logo-big .fp-gear{animation:fpGearSpin 6s linear infinite}
.fp-logo-big .fp-neon{stroke-width:3;animation:fpNeonPulse 3s ease-in-out infinite}

/* =====================================================================
   ✨ ANIMATIONS & POLISH
   ===================================================================== */
@keyframes ppViewIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes ppFadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes ppPop{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes ppFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes ppSlideBar{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes ppCount{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

@media (prefers-reduced-motion:no-preference){
  #view.view-anim{animation:ppViewIn .42s cubic-bezier(.22,1,.36,1)}
  #view.view-anim .kpi{animation:ppFadeUp .5s both cubic-bezier(.22,1,.36,1)}
  #view.view-anim .kpi:nth-child(1){animation-delay:.02s}
  #view.view-anim .kpi:nth-child(2){animation-delay:.08s}
  #view.view-anim .kpi:nth-child(3){animation-delay:.14s}
  #view.view-anim .kpi:nth-child(4){animation-delay:.20s}
  #view.view-anim .kpi:nth-child(5){animation-delay:.26s}
  #view.view-anim .kpi:nth-child(6){animation-delay:.32s}
  #view.view-anim .rep-item{animation:ppPop .4s both ease}
  #view.view-anim .rep-item:nth-child(2n){animation-delay:.04s}
  #view.view-anim .rep-item:nth-child(3n){animation-delay:.08s}
  #view.view-anim .qa{animation:ppFadeUp .45s both ease}
  .nav button{position:relative;overflow:hidden}
  .nav button.on::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:3px;background:#fff;opacity:.9;transform-origin:center;animation:ppSlideBar .3s ease both}
}

/* hover lift on cards & report tables */
.card{transition:transform .18s cubic-bezier(.22,1,.36,1),box-shadow .18s,border-color .18s}
.kpi{transition:transform .18s cubic-bezier(.22,1,.36,1),box-shadow .18s}
.kpi:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(31,58,95,.16)}
.rep-item{transition:transform .18s cubic-bezier(.22,1,.36,1),box-shadow .18s,border-color .18s}
.rep-item.on{border-color:var(--brand);box-shadow:0 0 0 3px var(--glowA,rgba(37,99,235,.18));transform:translateY(-2px)}

/* button press feedback */
.btn:active{transform:translateY(1px) scale(.985)}
.nav button:active{transform:scale(.98)}
.qa:active{transform:scale(.98)}

/* Bank Book summary stat cards */
.bb-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.bb-stat{position:relative;border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:var(--card);box-shadow:var(--shadow);overflow:hidden;transition:transform .18s,box-shadow .18s}
.bb-stat:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(31,58,95,.16)}
.bb-stat::after{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,var(--brand),var(--accent))}
.bb-stat .lab{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700}
.bb-stat .v{font-size:21px;font-weight:800;margin-top:6px;color:var(--ink);font-variant-numeric:tabular-nums;animation:ppCount .5s both ease}
.bb-stat.in .v{color:var(--green)}
.bb-stat.out .v{color:var(--red)}
.bb-stat.close .v{color:var(--brand)}
#view.view-anim .bb-stat{animation:ppPop .45s both ease}
#view.view-anim .bb-stat:nth-child(2){animation-delay:.06s}
#view.view-anim .bb-stat:nth-child(3){animation-delay:.12s}
#view.view-anim .bb-stat:nth-child(4){animation-delay:.18s}

.bb-select{min-width:230px;padding:9px 12px;border:1.5px solid var(--line);border-radius:10px;background:var(--card);color:var(--text);font-weight:600;transition:.15s;cursor:pointer}
.bb-select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--glowA,rgba(37,99,235,.18))}

.toast.show{animation:ppPop .3s ease}

@media (prefers-reduced-motion:no-preference){
  #view.view-anim tbody tr{animation:ppFadeUp .4s both ease}
  #view.view-anim tbody tr:nth-child(1){animation-delay:.02s}
  #view.view-anim tbody tr:nth-child(2){animation-delay:.05s}
  #view.view-anim tbody tr:nth-child(3){animation-delay:.08s}
  #view.view-anim tbody tr:nth-child(4){animation-delay:.11s}
  #view.view-anim tbody tr:nth-child(5){animation-delay:.14s}
}
</style>

const CLOUD_KEY = "fintopro_script_url";
function getScriptUrl(){ return localStorage.getItem(CLOUD_KEY)||""; }

async function cloudSync(){
  let url = getScriptUrl();
  if(!url){
    url = prompt("Paste your Google Apps Script Web App URL:");
    if(!url || !url.startsWith("https://")) return toast("Invalid URL. Sync cancelled.");
    setScriptUrl(url.trim());
  }
  await cloudPush(url);
}

async function cloudPush(url){
  const icon=document.getElementById("cloudIcon"), label=document.getElementById("cloudLabel"), btn=document.getElementById("cloudSyncBtn");
  try{
    icon.textContent="⏳"; label.textContent="Syncing…"; if(btn) btn.disabled=true;
    const res=await fetch(url,{method:"POST",body:JSON.stringify({action:"saveAll",data:db}),headers:{"Content-Type":"application/json"}});
    const json=await res.json();
    if(json.ok){ icon.textContent="✅"; label.textContent="Synced"; toast("Data saved to Google Sheets!"); localStorage.setItem("fintopro_last_sync",new Date().toISOString()); }
    else throw new Error(json.error||"Unknown error");
  }catch(err){ icon.textContent="❌"; label.textContent="Failed"; toast("Sync failed: "+err.message); }
  finally{ if(btn) btn.disabled=false; setTimeout(()=>{icon.textContent="☁️";label.textContent="Sync";},4000); }
}

async function cloudLoad(){
  const url=getScriptUrl();
  if(!url){ toast("No Google Sheet connected. Click Sync first."); return; }
  try{
    toast("Loading from Google Sheets…");
    const res=await fetch(url,{method:"POST",body:JSON.stringify({action:"loadAll"}),headers:{"Content-Type":"application/json"}});

}

function inr(n){ n=Number(n)||0; return "₹"+n.toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function inr0(n){ n=Number(n)||0; return "₹"+Math.round(n).toLocaleString("en-IN"); }

function fmtDate(d){ if(!d) return "—"; const p=d.split("-"); return p.length===3?`${p[2]}-${p[1]}-${p[0]}`:d; }
function fy(dateStr){ const d=new Date(dateStr||today()); const y=d.getFullYear(), m=d.getMonth(); const s=m>=3?y:y-1; return `${s}-${String(s+1).slice(2)}`; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }

/* Indian number to words */
function wordsINR(num){
  num=Math.round(Number(num)||0);
  if(num===0) return "Zero Rupees Only";
  const a=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const b=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  function two(n){ return n<20?a[n]:b[Math.floor(n/10)]+(n%10?" "+a[n%10]:""); }
  function three(n){ return (n>=100?a[Math.floor(n/100)]+" Hundred"+(n%100?" ":""):"")+(n%100?two(n%100):""); }
  let r=num, out="";
  const cr=Math.floor(r/10000000); r%=10000000;
  const lk=Math.floor(r/100000); r%=100000;
  const th=Math.floor(r/1000); r%=1000;
  const hd=r;
  if(cr) out+=three(cr)+" Crore ";
  if(lk) out+=three(lk)+" Lakh ";
  if(th) out+=three(th)+" Thousand ";
  if(hd) out+=three(hd);
  return out.trim().replace(/\s+/g," ")+" Rupees Only";
}

function computeKPIs(){
  let sales=0,gst=0,recv=0;
  db.invoices.forEach(i=>{ sales+=i.totals.taxable; gst+=i.totals.cgst+i.totals.sgst+i.totals.igst; recv+=Math.max(0,(i.totals.net-(i.paid||0))); });
  let purchases=0,inputCredit=0;
  db.vouchers.filter(v=>v.type==="purchase"||v.type==="purInvoice").forEach(v=>{ purchases+=v.taxable||0; inputCredit+=v.tax||0; });
  // payables from purchase bills (net - paid)
  let payables=0;
  (db.purchaseInvoices||[]).forEach(p=>{ payables+=Math.max(0,(p.totals?.net||0)-(p.paid||0)); });
  // TDS: receivable = deducted by clients on our receipts; deducted(payable) = we deducted on payments
  let tdsRecv=0,tdsDed=0;
  db.vouchers.forEach(v=>{ if(v.tds){ if(v.dir==="in") tdsRecv+=v.tds; else tdsDed+=v.tds; } });
  let stockVal=0; db.products.forEach(p=>stockVal+=(p.stock||0)*(p.purchase||0));
  let cash=0,bank=0;
  db.vouchers.forEach(v=>{
    if(v.mode==="cash") cash+=(v.dir==="in"?1:-1)*(v.amount||0);
    if(v.mode==="bank"||v.bankAccountId) bank+=(v.dir==="in"?1:-1)*(v.amount||0);
  });
  const bankBreakdown={};
  (db.bankAccounts||[]).forEach(ba=>{ bankBreakdown[ba.id]=0; });
  db.vouchers.forEach(v=>{
    if(v.bankAccountId){ bankBreakdown[v.bankAccountId]=(bankBreakdown[v.bankAccountId]||0)+(v.dir==="in"?1:-1)*(v.amount||0); }
    else if(v.mode==="bank"){ bankBreakdown["bank_default"]=(bankBreakdown["bank_default"]||0)+(v.dir==="in"?1:-1)*(v.amount||0); }
  });
  return {sales,gst,gstPaid:inputCredit,purchases,inputCredit,stockVal,recv,payables,tdsRecv,tdsDed,cash,bank,bankBreakdown};
}

  const tdy=today();

  document.getElementById("view").innerHTML=`

function recentTxns(n){
  const list=[];
  db.invoices.forEach(i=>list.push({date:i.date,kind:"Invoice",cls:"green",title:i.number,sub:i.buyer.name,amt:i.totals.net,sign:1}));
  (db.purchaseInvoices||[]).forEach(p=>list.push({date:p.date,kind:"Expense",cls:"red",title:p.billNo||"Bill",sub:p.supplierName,amt:p.totals?.net||0,sign:-1}));
  db.vouchers.filter(v=>v.type==="receipt").forEach(v=>list.push({date:v.date,kind:v.dir==="in"?"Receipt":"Payment",cls:v.dir==="in"?"cyan":"amber",title:(v.dir==="in"?"Received":"Paid")+(v.partyId?" · "+partyName(v.partyId):""),sub:v.narration,amt:v.amount,sign:v.dir==="in"?1:-1}));
  (db.parchas||[]).forEach(p=>list.push({date:p.date,kind:"Receipt",cls:"cyan",title:p.number,sub:p.buyer?.name,amt:p.totals?.net||0,sign:1}));
  return list.sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,n);
}

function monthBuckets(n){
  const arr=[]; const d=new Date();
  for(let i=n-1;i>=0;i--){ const dt=new Date(d.getFullYear(),d.getMonth()-i,1); arr.push({key:`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}`,label:dt.toLocaleString("en-IN",{month:"short"})}); }
  return arr;
}
function drawCharts(topOut){
  const dk=document.body.classList.contains("dark");
  Chart.defaults.font.family="Segoe UI, sans-serif";
  Chart.defaults.color=dk?"#8aa8a1":"#6b7793";
  const grid=dk?"#1f4a44":"#eef4f1";
  const bar1=dk?"#1ab39f":"#0e7c70";
  const bar2=dk?"#f4566e":"#cc3a4e";
  const bar3=dk?"#22c997":"#0f8f6a";
  const mb=monthBuckets(6);
  const G=id=>document.getElementById(id);
  // Revenue by month (from invoices)
  const revByM={}, expByM={};
  db.invoices.forEach(i=>{ const k=(i.date||"").slice(0,7); revByM[k]=(revByM[k]||0)+(i.totals.net||0); });
  (db.parchas||[]).forEach(p=>{ const k=(p.date||"").slice(0,7); revByM[k]=(revByM[k]||0)+(p.totals?.net||0); });
  (db.purchaseInvoices||[]).forEach(p=>{ const k=(p.date||"").slice(0,7); expByM[k]=(expByM[k]||0)+(p.totals?.net||0); });
  if(G("cRevenue")) _charts.push(new Chart(G("cRevenue"),{type:"bar",data:{labels:mb.map(m=>m.label),datasets:[{label:"Revenue",data:mb.map(m=>revByM[m.key]||0),backgroundColor:bar1,borderRadius:6,maxBarThickness:38}]},options:chOpts(grid)}));
  if(G("cExpense")) _charts.push(new Chart(G("cExpense"),{type:"bar",data:{labels:mb.map(m=>m.label),datasets:[{label:"Expenses",data:mb.map(m=>expByM[m.key]||0),backgroundColor:bar2,borderRadius:6,maxBarThickness:38}]},options:chOpts(grid)}));
  // Outstanding clients doughnut
  if(G("cOut")){
    const data=(topOut||[]).filter(x=>x[1]>0);
    const pie=dk?["#1ab39f","#5fd0c1","#e0a93f","#22c997","#f4566e","#9aa8c4"]:["#0e7c70","#1aa896","#c2841b","#0f8f6a","#cc3a4e","#6b7793"];
    if(data.length) _charts.push(new Chart(G("cOut"),{type:"doughnut",data:{labels:data.map(c=>c[0]),datasets:[{data:data.map(c=>c[1]),backgroundColor:pie}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{boxWidth:12,font:{size:11}}}}}}));
  }
  // Top services billed
  if(G("cProd")){
    const byProd={}; db.invoices.forEach(i=>i.items.forEach(it=>{ if(it.name) byProd[it.name]=(byProd[it.name]||0)+(Number(it.qty||0)*Number(it.rate||0)); }));
    const prod=Object.entries(byProd).sort((a,b)=>b[1]-a[1]).slice(0,6);
    _charts.push(new Chart(G("cProd"),{type:"bar",data:{labels:prod.map(p=>p[0]),datasets:[{label:"Billed",data:prod.map(p=>p[1]),backgroundColor:bar3,borderRadius:6,maxBarThickness:26}]},options:{...chOpts(grid),indexAxis:"y"}}));
  }
}
function chOpts(grid){ const g=grid||"#eef4f1"; return {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:g},ticks:{callback:v=>"₹"+(v>=1000?(v/1000)+"k":v)}},x:{grid:{display:false}}}}; }

function partyBalance(pid){
  let bal=0; // positive = they owe us (Dr); negative = we owe them (Cr)
  // Sales invoices (only if ledger link enabled)
  db.invoices.filter(i=>i.buyer.partyId===pid && i.linkLedger!==false).forEach(i=>{
    bal += i.totals.net;
    bal -= (i.paid||0);
  });
  // Parchas (quick receipts, if ledger link enabled)
  (db.parchas||[]).filter(p=>p.buyer.partyId===pid && p.linkLedger!==false).forEach(p=>{
    bal += p.totals.net;
    bal -= (p.paid||0);
  });
  // Vouchers linked to this party (manual entries, payments, purchases)
  db.vouchers.filter(v=>v.partyId===pid && v.linkLedger!==false).forEach(v=>{
    if(v.type==="purchase"||v.type==="purInvoice") bal -= v.amount;
    else if(v.type==="manual"){ bal += (v.dr||0); bal -= (v.cr||0); }
    else { if(v.dir==="in") bal -= v.amount; if(v.dir==="out") bal += v.amount; }
  });
  return bal;
}

function agingBuckets(){
  const out={}; const now=new Date();
  db.invoices.forEach(i=>{ const due=Math.max(0,i.totals.net-(i.paid||0)); if(due<=0) return;
    const pid=i.buyer.partyId; if(!pid) return;
    const days=Math.floor((now-new Date(i.date))/86400000);
    out[pid]=out[pid]||{c:0,d30:0,d60:0,d90:0,d90p:0};
    if(days<=0) out[pid].c+=due; else if(days<=30) out[pid].d30+=due; else if(days<=60) out[pid].d60+=due; else if(days<=90) out[pid].d90+=due; else out[pid].d90p+=due;
  });
  return out;
}

  document.getElementById("p_gstin_e").textContent=(g&&!validGSTIN(g))?"Invalid GSTIN":"";
}
function saveParty(pid){

  const g=val("p_gstin").toUpperCase(); if(g&&!validGSTIN(g)){toast("Invalid GSTIN");return;}
  const phone=val("p_phone"); if(phone&&!validMobile(phone)){toast("Mobile must be 10 digits");return;}
  const email=val("p_email"); if(!validEmail(email)){toast("Invalid email");return;}
  const obj={name,gstin:g,pan:val("p_pan").toUpperCase(),state:val("p_state"),stateCode:val("p_stateCode"),
    address:val("p_address"),phone,email,creditLimit:+val("p_creditLimit")||0,creditDays:+val("p_creditDays")||0};
  if(pid){ const i=db.parties.findIndex(x=>x.id===pid); db.parties[i]={...db.parties[i],...obj}; }

function partyLedger(pid){
  const p=db.parties.find(x=>x.id===pid);
  const entries=[];
  // Sales invoices
  db.invoices.filter(i=>i.buyer.partyId===pid).forEach(i=>{
    const linked=i.linkLedger!==false;
    entries.push({date:i.date,vno:i.number,part:"Sales Invoice",dr:i.totals.net,cr:0,clr:"dr",linked,deletable:false,id:i.id,src:"invoice"});
    if((i.paid||0)>0) entries.push({date:i.date,vno:i.number+"-REC",part:"Receipt on invoice",dr:0,cr:i.paid,clr:"cr",linked,deletable:false,id:i.id,src:null});
  });
  // Parchas
  (db.parchas||[]).filter(pa=>pa.buyer.partyId===pid).forEach(pa=>{
    const linked=pa.linkLedger!==false;
    entries.push({date:pa.date,vno:pa.number,part:"Quick Receipt",dr:pa.totals.net,cr:0,clr:"dr",linked,deletable:false,src:null});
    if((pa.paid||0)>0) entries.push({date:pa.date,vno:pa.number+"-PAY",part:"Payment on Receipt",dr:0,cr:pa.paid,clr:"cr",linked,deletable:false,src:null});
  });
  // Vouchers
  db.vouchers.filter(v=>v.partyId===pid).forEach(v=>{
    const linked=v.linkLedger!==false;
    if(v.type==="purchase") entries.push({date:v.date,vno:"PUR"+(v.bill?"/"+v.bill:""),part:"Purchase Bill"+(v.narration?" · "+v.narration:""),dr:0,cr:v.amount,clr:"pur",linked,deletable:true,id:v.id});
    else if(v.type==="manual") entries.push({date:v.date,vno:"JRN"+(v.ref?"/"+v.ref:""),part:"Journal: "+esc(v.narration||""),dr:v.dr||0,cr:v.cr||0,clr:v.dr?"dr":"cr",linked,deletable:true,id:v.id});
    else { const isIn=v.dir==="in"; entries.push({date:v.date,vno:v.mode.toUpperCase(),part:(v.type==="purInvoice"?"Purchase Bill"+(v.narration?" · "+v.narration.split("·")[1]?.trim():""):(isIn?"Receipt":"Payment"))+(v.narration&&v.type!=="purInvoice"?" · "+v.narration:""),dr:v.type==="purInvoice"?0:(isIn?0:v.amount),cr:v.type==="purInvoice"?v.amount:(isIn?v.amount:0),clr:v.type==="purInvoice"?"pur":(isIn?"cr":"dr"),linked,deletable:true,id:v.id});
      if(v.tds>0){ const isIn=v.dir==="in"; entries.push({date:v.date,vno:"TDS"+(v.tdsSection?"/"+v.tdsSection:""),part:"TDS "+(isIn?"deducted by client":"deducted by you")+(v.tdsSection?" ("+v.tdsSection+")":""),dr:isIn?0:v.tds,cr:isIn?v.tds:0,clr:isIn?"cr":"dr",linked,deletable:false,id:v.id}); } }
  });
  entries.sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  let bal=0;
  const rows=entries.map(e=>{
    if(e.linked) bal+=e.dr-e.cr;
    const drTd=e.dr?`<td class="t-r num" style="color:var(--red);font-weight:600">${inr(e.dr)}</td>`:`<td class="t-r num" style="color:var(--muted)">—</td>`;
    const crTd=e.cr?`<td class="t-r num" style="color:var(--green);font-weight:600">${inr(e.cr)}</td>`:`<td class="t-r num" style="color:var(--muted)">—</td>`;
    const typeTag=e.clr==="cr"?`<span class="tag green" style="font-size:10px">CR</span>`
      :e.clr==="pur"?`<span class="tag amber" style="font-size:10px">PUR</span>`
      :`<span class="tag red" style="font-size:10px">DR</span>`;
    const noLink=!e.linked?`<span class="tag grey" style="font-size:9px;margin-left:3px">No ledger</span>`:"";
    const delBtn=e.deletable?`<button class="btn sm danger" style="padding:3px 7px" onclick="deleteVoucher('${e.id}');closeModal();">✕</button>`:`<span></span>`;
    return `<tr><td class="num">${fmtDate(e.date)}</td><td>${esc(e.vno)}</td>
      <td>${typeTag}${noLink} ${esc(e.part)}</td>${drTd}${crTd}
      <td class="t-r num" style="font-weight:700;color:${Math.abs(bal)<0.01?"var(--muted)":bal>0?"var(--green)":"var(--red)"}">
        ${inr(Math.abs(bal))} <span style="font-size:11px">${bal>0.01?"Dr":bal<-0.01?"Cr":"—"}</span></td>
      <td>${delBtn}</td></tr>`;
  }).join("");
  const closing=partyBalance(pid);
  openModal(`<div class="mhead"><h3>Ledger · ${esc(p.name)}</h3><button class="x" onclick="closeModal()">×</button></div>
   <div class="mbody">
     <div style="display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
       <div style="font-size:12px;color:var(--muted)">🟢 <b>Dr</b> = they owe you (Receivable) &nbsp;|&nbsp; 🔴 <b>Cr</b> = you owe them (Payable)</div>
       <button class="btn sm primary" onclick="closeModal();setTimeout(()=>manualEntryForm('${pid}'),100)">＋ Add entry</button>
     </div>
     <div class="card" style="overflow:auto"><table><thead><tr><th>Date</th><th>Voucher</th><th>Particulars</th><th class="t-r">Dr (₹)</th><th class="t-r">Cr (₹)</th><th class="t-r">Balance</th><th></th></tr></thead>
     <tbody>${rows||`<tr><td colspan="7" class="empty">No transactions yet</td></tr>`}</tbody></table></div>
     <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
       <div style="color:var(--muted);font-size:13px">Closing balance</div>
       <div style="font-size:20px;font-weight:800;color:${closing>0?"var(--green)":closing<0?"var(--red)":"var(--muted)"}">
         ${inr(Math.abs(closing))} <span class="tag ${closing>0?"green":closing<0?"red":"grey"}">${closing>0.01?"Receivable (Dr)":closing<-0.01?"Payable (Cr)":"Settled"}</span>
       </div>
     </div>
   </div>
   <div class="mfoot"><button class="btn ghost" onclick="closeModal()">Close</button></div>`,true);
}

function puCalc(){
  try{
    const pid=document.getElementById("pu_prod").value;
    const p=db.products.find(x=>x.id===pid);
    const qty=+document.getElementById("pu_qty").value||0;
    const rate=+document.getElementById("pu_rate").value||0;
    const taxable=qty*rate;
    const gstRate=p?p.gst:0;
    const tax=taxable*gstRate/100;
    document.getElementById("pu_taxable").textContent=inr(taxable);
    document.getElementById("pu_tax").textContent=inr(tax);
    document.getElementById("pu_gstrate").textContent=gstRate+"%";
    document.getElementById("pu_total").textContent=inr(taxable+tax);
  }catch(e){}
}
function savePurchase(){
  const pid=document.getElementById("pu_prod").value;
  if(!pid){toast("Select a product");return;}
  const qty=+val("pu_qty"); const rate=+val("pu_rate");
  if(!qty||qty<=0){toast("Enter quantity");return;}
  if(!rate||rate<=0){toast("Enter purchase rate");return;}
  const partyId=document.getElementById("pu_party").value;
  const p=db.products.find(x=>x.id===pid);
  // Update stock
  p.stock+=qty;
  const taxable=qty*rate;
  const tax=taxable*(p.gst/100);
  const total=taxable+tax;
  const bill=val("pu_bill");
  // Post voucher — Cr supplier ledger (they supplied goods, we owe them)
  const lt=document.getElementById("puLedger");
  const linked=!(lt&&lt.classList.contains("off"));
  db.vouchers.push({
    id:id(), type:"purchase", dir:"in", mode:"bill", date:val("pu_date"),
    partyId, bill, items:[{pid,qty,rate}],
    taxable, tax, amount:total, linkLedger:linked,
    narration:`Purchase ${bill?("Bill "+bill+" · "):""}${p.name} x${qty} @ ${inr(rate)}`
  });
  saveDB(); closeModal(); itabRender(_itab);
  toast(`Expense bill saved · ${inr(total)} posted to supplier ledger`);
}

function recalc(){
  // sync header fields
  draft.placeOfSupply=val("i_pos"); draft.buyer.state=val("b_state"); draft.buyer.stateCode=val("b_stateCode");
  const gstOn=draft.gstEnabled!==false;
  const posState=draft.placeOfSupply||draft.buyer.state;
  const interstate = gstOn && posState && db.seller.state && (posState.trim().toLowerCase()!==db.seller.state.trim().toLowerCase());
  draft.interstate=interstate;
  let taxable=0,cgst=0,sgst=0,igst=0,gross=0;
  draft.items.forEach((it,idx)=>{
    const base=(+it.qty||0)*(+it.rate||0);
    const autoT=base*(1-(+it.disc||0)/100);
    const t=(it.taxOverride!=null)?it.taxOverride:autoT;
    const g=gstOn?(t*(+it.gst||0)/100):0;
    let c=0,s=0,i=0;
    if(gstOn){ if(interstate){ i=g; } else { c=g/2; s=g/2; } }
    taxable+=t; cgst+=c; sgst+=s; igst+=i; gross+=t+g;
    const taxInp=document.getElementById("it_tax_"+idx);
    if(taxInp && it.taxOverride==null){ taxInp.placeholder=inr(autoT); }
    setText("it_cgst_"+idx,c?inr(c):"—");
    setText("it_sgst_"+idx,s?inr(s):"—"); setText("it_igst_"+idx,i?inr(i):"—"); setText("it_tot_"+idx,inr(t+g));
  });
  const rounded=Math.round(gross); const roundoff=rounded-gross;
  draft.totals={taxable,cgst,sgst,igst,roundoff,net:rounded};
  draft.paid=+val("i_paid")||0;
  const note=document.getElementById("taxModeNote");
  if(note) note.innerHTML=gstOn?`<span class="tag ${interstate?'amber':'green'}">${interstate?'Inter-state → IGST applies':'Intra-state → CGST + SGST applies'}</span>
    <span style="color:var(--muted);font-size:12px;margin-left:8px">Seller: ${esc(db.seller.state)} · Place of supply: ${esc(posState||'—')}</span>`
    :`<span class="tag grey">GST OFF · No tax charged on this invoice</span>`;
  const tb=document.getElementById("totBox");
  if(tb) tb.innerHTML=`
    <div class="l">${gstOn?'Taxable value':'Sub-total'} <b class="num">${inr(taxable)}</b></div>
    ${gstOn?(interstate?`<div class="l">IGST <b class="num">${inr(igst)}</b></div>`:`<div class="l">CGST <b class="num">${inr(cgst)}</b></div><div class="l">SGST <b class="num">${inr(sgst)}</b></div>`):''}
    <div class="l">Round off <b class="num">${roundoff>=0?'+':''}${inr(roundoff)}</b></div>
    <div class="l grand">Net payable <b class="num">${inr(rounded)}</b></div>
    <div class="l">Balance due <b class="num">${inr(Math.max(0,rounded-(+val("i_paid")||0)))}</b></div>`;
}
function setText(id,t){ const e=document.getElementById(id); if(e)e.textContent=t; }

function saveInvoice(){
  // gather
  draft.number=val("i_number"); draft.date=val("i_date"); draft.due=val("i_due");
  draft.placeOfSupply=val("i_pos"); draft.reverse=document.getElementById("i_reverse").value;
  draft.eway=val("i_eway"); draft.vehicle=val("i_vehicle");
  draft.gstEnabled=draft.gstEnabled!==false;
  const lt=document.getElementById("invLedgerToggle");
  if(lt) draft.linkLedger=!lt.classList.contains("off");
  draft.buyer={partyId:document.getElementById("i_party").value,name:val("b_name"),address:val("b_address"),
    gstin:val("b_gstin").toUpperCase(),pan:val("b_pan").toUpperCase(),state:val("b_state"),
    stateCode:val("b_stateCode"),phone:val("b_phone"),email:val("b_email")};
  if(!draft.buyer.name){toast("Customer name is required");return;}
  if(draft.buyer.gstin && !validGSTIN(draft.buyer.gstin)){toast("Buyer GSTIN is invalid");return;}
  if(draft.buyer.phone && !validMobile(draft.buyer.phone)){toast("Buyer mobile must be 10 digits");return;}
  if(!validEmail(draft.buyer.email)){toast("Buyer email is invalid");return;}
  if(!draft.items.some(it=>it.name && (+it.qty>0))){toast("Add at least one item with quantity");return;}
  recalc();

  // auto-create party if new buyer with details
  if(!draft.buyer.partyId && draft.buyer.name){
    const existing=db.parties.find(p=>p.name.toLowerCase()===draft.buyer.name.toLowerCase());
    if(existing){ draft.buyer.partyId=existing.id; }
    else { const np={id:id(),...draft.buyer}; delete np.partyId; db.parties.push(np); draft.buyer.partyId=np.id; }
  }

  const isNew=!db.invoices.some(x=>x.id===draft.id);
  // restore stock for edited invoice before re-deducting
  if(!isNew){ const old=db.invoices.find(x=>x.id===draft.id); old.items.forEach(it=>{ const p=db.products.find(x=>x.id===it.pid); if(p)p.stock+=Number(it.qty)||0; }); }
  // deduct stock
  draft.items.forEach(it=>{ const p=db.products.find(x=>x.id===it.pid); if(p)p.stock-=Number(it.qty)||0; });

  if(isNew){ db.invoices.push(JSON.parse(JSON.stringify(draft))); if(draft.number===nextInvNo())db.invCounter++; else db.invCounter++; }
  else { const i=db.invoices.findIndex(x=>x.id===draft.id); db.invoices[i]=JSON.parse(JSON.stringify(draft)); }

  saveDB(); toast("Invoice saved · stock & ledger updated"); renderInvoices();
}

function pickPurItem(idx,pid){
  const p=db.products.find(x=>x.id===pid); if(!p){purDraft.items[idx].pid="";return;}
  Object.assign(purDraft.items[idx],{pid,name:p.name,hsn:p.hsn,unit:p.unit,rate:p.purchase,gst:p.gst});
  renderPurItems(); purRecalc();

function purRecalc(){
  try{
    const supplierState=document.getElementById("pur_sstate").value||"";
    const interstate=supplierState && db.seller.state && (supplierState.trim().toLowerCase()!==db.seller.state.trim().toLowerCase());
    purDraft.interstate=interstate;
    let taxable=0,cgst=0,sgst=0,igst=0,gross=0;
    purDraft.items.forEach((it,idx)=>{
      const base=(+it.qty||0)*(+it.rate||0);
      const t=base*(1-(+it.disc||0)/100);
      const g=t*(+it.gst||0)/100;
      let c=0,s=0,i=0;
      if(interstate){i=g;}else{c=g/2;s=g/2;}
      taxable+=t;cgst+=c;sgst+=s;igst+=i;gross+=t+g;
      const setT=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
      setT("pit_tax_"+idx,t?inr(t):"—");setT("pit_cgst_"+idx,c?inr(c):"—");
      setT("pit_sgst_"+idx,s?inr(s):"—");setT("pit_igst_"+idx,i?inr(i):"—");setT("pit_tot_"+idx,(t+g)?inr(t+g):"—");
    });
    const rounded=Math.round(gross);const roundoff=rounded-gross;
    purDraft.totals={taxable,cgst,sgst,igst,roundoff,net:rounded};
    const note=document.getElementById("purTaxModeNote");
    if(note) note.innerHTML=`<span class="tag ${interstate?'amber':'green'}">${interstate?'Inter-state → IGST applies':'Intra-state → CGST + SGST applies'}</span>`;
    const tb=document.getElementById("purTotBox");
    if(tb) tb.innerHTML=`
      <div class="l">Taxable value <b class="num">${inr(taxable)}</b></div>
      ${interstate?`<div class="l">IGST <b class="num">${inr(igst)}</b></div>`:`<div class="l">CGST <b class="num">${inr(cgst)}</b></div><div class="l">SGST <b class="num">${inr(sgst)}</b></div>`}
      <div class="l">Round off <b class="num">${roundoff>=0?'+':''}${inr(Math.abs(roundoff))}</b></div>
      <div class="l grand">Net payable <b class="num">${inr(rounded)}</b></div>
      <div class="l">Balance due <b class="num">${inr(Math.max(0,rounded-(+document.getElementById("pur_paid").value||0)))}</b></div>`;
  }catch(e){}
}
function savePurchaseInvoice(){
  if(!db.purchaseInvoices) db.purchaseInvoices=[];
  purDraft.billNo=document.getElementById("pur_billno").value.trim();
  if(!purDraft.billNo){toast("Supplier bill number is required");return;}
  purDraft.supplierName=document.getElementById("pur_sname").value.trim();
  if(!purDraft.supplierName){toast("Supplier name is required");return;}
  if(!purDraft.items.some(it=>it.name&&(+it.qty>0))){toast("Add at least one item with quantity");return;}
  purDraft.date=document.getElementById("pur_date").value;
  purDraft.due=document.getElementById("pur_due").value;
  purDraft.supplierAddress=document.getElementById("pur_saddr").value;
  purDraft.supplierGstin=document.getElementById("pur_sgstin").value.toUpperCase();
  purDraft.supplierState=document.getElementById("pur_sstate").value;
  purDraft.paid=+document.getElementById("pur_paid").value||0;
  const partyEl=document.getElementById("pur_party"); purDraft.supplierPartyId=partyEl?partyEl.value:"";
  const lt=document.getElementById("purLedgerToggle"); purDraft.linkLedger=!(lt&&lt.classList.contains("off"));
  const updateStock=document.getElementById("pur_updateStock").checked;
  purRecalc();

  // auto-create supplier party
  if(!purDraft.supplierPartyId && purDraft.supplierName){
    const existing=db.parties.find(p=>p.name.toLowerCase()===purDraft.supplierName.toLowerCase());
    if(existing){ purDraft.supplierPartyId=existing.id; }
    else { const np={id:id(),name:purDraft.supplierName,address:purDraft.supplierAddress,gstin:purDraft.supplierGstin,state:purDraft.supplierState}; db.parties.push(np); purDraft.supplierPartyId=np.id; }
  }

  const isNew=!db.purchaseInvoices.some(x=>x.id===purDraft.id);
  // restore stock for old bill before re-adding
  if(!isNew){
    const old=db.purchaseInvoices.find(x=>x.id===purDraft.id);
    if(old) old.items.forEach(it=>{ const p=db.products.find(x=>x.id===it.pid); if(p)p.stock-=Number(it.qty)||0; });
    db.vouchers=db.vouchers.filter(v=>v.purInvoiceId!==purDraft.id);
  }
  // add stock
  if(updateStock) purDraft.items.forEach(it=>{ const p=db.products.find(x=>x.id===it.pid); if(p)p.stock+=Number(it.qty)||0; });

  // post voucher to supplier ledger
  if(purDraft.linkLedger && purDraft.supplierPartyId){
    db.vouchers.push({id:id(),type:"purInvoice",dir:"in",mode:"bill",date:purDraft.date,
      partyId:purDraft.supplierPartyId,purInvoiceId:purDraft.id,
      taxable:purDraft.totals.taxable,tax:purDraft.totals.cgst+purDraft.totals.sgst+purDraft.totals.igst,
      amount:purDraft.totals.net,linkLedger:true,
      narration:`Purchase Bill ${purDraft.billNo} · ${purDraft.supplierName}`});
  }

  if(isNew) db.purchaseInvoices.push(JSON.parse(JSON.stringify(purDraft)));
  else { const i=db.purchaseInvoices.findIndex(x=>x.id===purDraft.id); db.purchaseInvoices[i]=JSON.parse(JSON.stringify(purDraft)); }

  saveDB(); toast("Purchase bill saved · stock & supplier ledger updated"); renderPurchaseInvoices();
}

/* ---- HSN/SAC Tax Breakup & UPI QR helpers ---- */
function taxBreakupHTML(i, inter){
  const map={};
  i.items.filter(it=>it.name&&+it.qty>0).forEach(it=>{
    const key=(it.hsn||"—")+":"+(+it.gst||0);
    const taxable=(+it.qty)*(+it.rate)*(1-(+it.disc||0)/100);
    if(!map[key]) map[key]={hsn:it.hsn||"—",gst:+it.gst||0,taxable:0};
    map[key].taxable+=taxable;
  });
  const rows=Object.values(map);
  if(!rows.length) return "";
  let tTaxable=0,tC=0,tS=0,tI=0,tTax=0;
  const body=rows.map(r=>{
    const tax=r.taxable*r.gst/100;
    const c=inter?0:tax/2, s=inter?0:tax/2, ig=inter?tax:0;
    tTaxable+=r.taxable; tC+=c; tS+=s; tI+=ig; tTax+=tax;
    return inter
      ?`<tr><td>${esc(r.hsn)}</td><td class="t-r">${inr(r.taxable)}</td><td class="t-c">${r.gst}%</td><td class="t-r">${inr(ig)}</td><td class="t-r"><b>${inr(tax)}</b></td></tr>`
      :`<tr><td>${esc(r.hsn)}</td><td class="t-r">${inr(r.taxable)}</td><td class="t-c">${(r.gst/2).toFixed(1).replace('.0','')}%</td><td class="t-r">${inr(c)}</td><td class="t-c">${(r.gst/2).toFixed(1).replace('.0','')}%</td><td class="t-r">${inr(s)}</td><td class="t-r"><b>${inr(tax)}</b></td></tr>`;
  }).join("");
  const foot=inter
    ?`<tr><td><b>Total</b></td><td class="t-r"><b>${inr(tTaxable)}</b></td><td></td><td class="t-r"><b>${inr(tI)}</b></td><td class="t-r"><b>${inr(tTax)}</b></td></tr>`
    :`<tr><td><b>Total</b></td><td class="t-r"><b>${inr(tTaxable)}</b></td><td></td><td class="t-r"><b>${inr(tC)}</b></td><td></td><td class="t-r"><b>${inr(tS)}</b></td><td class="t-r"><b>${inr(tTax)}</b></td></tr>`;
  const head=inter
    ?`<tr><th rowspan="2">SAC</th><th class="t-r" rowspan="2">Taxable Amount</th><th class="t-c" colspan="2">IGST</th><th class="t-r" rowspan="2">Total Tax</th></tr><tr><th class="t-c">Rate</th><th class="t-r">Amount</th></tr>`
    :`<tr><th rowspan="2">SAC</th><th class="t-r" rowspan="2">Taxable Value</th><th class="t-c" colspan="2">Central Tax (CGST)</th><th class="t-c" colspan="2">State Tax (SGST)</th><th class="t-r" rowspan="2">Total Tax</th></tr><tr><th class="t-c">Rate</th><th class="t-r">Amt</th><th class="t-c">Rate</th><th class="t-r">Amt</th></tr>`;
  return `<div class="brkup"><div class="brkup-label">SAC Wise Tax Summary</div>
    <table class="brkup-table"><thead>${head}</thead><tbody>${body}</tbody><tfoot>${foot}</tfoot></table></div>`;
}

function makeUPIQR(upiId, name, amount, invoiceNo){
  if(!upiId) return "";
  try{
    const data=`upi://pay?pa=${encodeURIComponent(upiId)}&pn=${encodeURIComponent(name)}&am=${amount}&tn=${encodeURIComponent(invoiceNo)}&cu=INR`;
    if(window.qrcode){
      const qr=qrcode(0,"M");
      qr.addData(data);
      qr.make();
      const svgStr=qr.createSvgTag(3,2,"UPI QR",true);
      return `<div class="upi-qr">${svgStr}<div class="qr-info">
        <div class="qr-title">📱 Pay via UPI</div>
        <div class="qr-upi">${esc(upiId)}</div>
        <div>${esc(name)}</div>
        <div style="margin-top:4px;font-size:11.5px;font-weight:700">Amount: <b>${inr(amount)}</b></div>
        <div class="qr-scan">Scan with any UPI app (GPay, PhonePe, Paytm…)</div>
      </div></div>`;
    }
    return `<div class="upi-qr"><div class="qr-info"><div class="qr-title">📱 Pay via UPI</div><div class="qr-upi">${esc(upiId)}</div><div class="qr-scan">UPI ID: ${esc(upiId)}</div></div></div>`;
  }catch(e){ return ""; }
}

function printInvoice(){ const i=db.invoices.find(x=>x.id===viewId); document.getElementById("print-root").innerHTML=invoiceHTML(i,i.template); window.print(); }
function downloadPDF(invId){
  const inv=db.invoices.find(x=>x.id===invId);
  if(!window.jspdf){toast("PDF library not loaded — use Print → Save as PDF");printInvoice();return;}
  toast("Generating PDF…");
  const {jsPDF}=window.jspdf;
  const s=db.seller;
  const t=inv.totals;
  const inter=inv.buyer.state&&s.state&&inv.buyer.state!==s.state;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const pW=doc.internal.pageSize.getWidth();
  const LM=14, RM=14, TM=14;
  let y=TM;

  // ── helper functions ──
  const line=(x1,y1,x2,y2,c)=>{doc.setDrawColor(c||"#cccccc");doc.line(x1,y1,x2,y2);};
  // pdfInr: jsPDF Helvetica can't render ₹, use "Rs." instead
  const pdfInr=(n)=>{n=Number(n)||0;return "Rs."+n.toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2});};
  const txt=(text,x,yy,opts)=>{
    opts=opts||{};
    doc.setFontSize(opts.size||10);
    doc.setFont("helvetica",opts.bold?"bold":opts.italic?"italic":"normal");
    if(opts.color)doc.setTextColor(opts.color);else doc.setTextColor("#222222");
    if(opts.align==="right")doc.text(String(text),x,yy,{align:"right"});
    else if(opts.align==="center")doc.text(String(text),x,yy,{align:"center"});
    else doc.text(String(text),x,yy);
  };
  // numToWords: converts a number to Indian English words
  const numToWords=(n)=>{
    n=Math.round(Number(n)||0);
    if(n===0)return"Zero";
    const ones=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
    const tens=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
    const toHundred=(num)=>{
      if(num===0)return"";
      if(num<20)return ones[num]+" ";
      return tens[Math.floor(num/10)]+(num%10?" "+ones[num%10]:"")+" ";
    };
    let result="",rem=n;
    if(rem>=10000000){result+=toHundred(Math.floor(rem/10000000))+"Crore ";rem%=10000000;}
    if(rem>=100000){result+=toHundred(Math.floor(rem/100000))+"Lakh ";rem%=100000;}
    if(rem>=1000){result+=toHundred(Math.floor(rem/1000))+"Thousand ";rem%=1000;}
    if(rem>=100){result+=ones[Math.floor(rem/100)]+" Hundred ";rem%=100;}
    if(rem>0)result+=toHundred(rem);
    return result.trim();
  };

  // ── HEADER BLOCK ──
  // Business name + address (left)
  txt(s.name||"Business Name",LM,y,{size:15,bold:true,color:"#16243f"});
  y+=5.5;
  if(s.gstin){txt("GSTIN: "+s.gstin,LM,y,{size:8,color:"#555555"});y+=4;}
  if(s.address){const lines=doc.splitTextToSize(s.address,80);lines.forEach(l=>{txt(l,LM,y,{size:8,color:"#555555"});y+=3.8;});}
  if(s.phone){txt("Ph: "+s.phone,LM,y,{size:8,color:"#555555"});y+=4;}

  // Invoice title + number (right)
  const docTypeLabels={"Tax Invoice":"TAX INVOICE","Quotation":"QUOTATION","Proforma Invoice":"PROFORMA INVOICE","Engagement Letter":"ENGAGEMENT LETTER","Credit Note":"CREDIT NOTE","Debit Note":"DEBIT NOTE"};
  const docLabel=docTypeLabels[inv.docType]||"TAX INVOICE";
  txt(docLabel,pW-RM,TM,{size:14,bold:true,color:"#0e7c70",align:"right"});
  txt("No: "+inv.number,pW-RM,TM+7,{size:9,color:"#444444",align:"right"});
  txt("Date: "+fmtDate(inv.date),pW-RM,TM+12,{size:9,color:"#444444",align:"right"});
  if(inv.dueDate)txt("Due: "+fmtDate(inv.dueDate),pW-RM,TM+17,{size:9,color:"#444444",align:"right"});

  y=Math.max(y,TM+22)+4;
  line(LM,y,pW-RM,y,"#cccccc");y+=5;

  // ── BILL TO / SHIP TO ──
  const colMid=pW/2;
  txt("BILL TO",LM,y,{size:7.5,bold:true,color:"#888888"});
  y+=4;
  txt(inv.buyer.name||"",LM,y,{size:10,bold:true});y+=4.5;
  if(inv.buyer.gstin){txt("GSTIN: "+inv.buyer.gstin,LM,y,{size:8,color:"#555555"});y+=4;}
  if(inv.buyer.address){const bl=doc.splitTextToSize(inv.buyer.address,75);bl.forEach(l=>{txt(l,LM,y,{size:8,color:"#555555"});y+=3.8;});}
  if(inv.buyer.phone){txt("Ph: "+inv.buyer.phone,LM,y,{size:8,color:"#555555"});y+=4;}
  if(inv.buyer.state)txt("State: "+inv.buyer.state,LM,y,{size:8,color:"#555555"});

  y+=8;
  line(LM,y,pW-RM,y,"#cccccc");y+=6;

  // ── ITEMS TABLE ──
  const items=inv.items.filter(x=>x.name);
  const hasDisc=items.some(x=>+x.disc>0);
  const colDefs=hasDisc
    ?[{h:"#",w:8},{h:"Service / Description",w:55},{h:"SAC",w:16},{h:"Qty",w:14},{h:"Rate",w:20},{h:"Disc%",w:14},{h:"Taxable",w:22},{h:"GST%",w:13},{h:"Amount",w:22}]
    :[{h:"#",w:8},{h:"Service / Description",w:64},{h:"SAC",w:16},{h:"Qty",w:14},{h:"Rate",w:22},{h:"Taxable",w:24},{h:"GST%",w:14},{h:"Amount",w:22}];

  // Table header row
  const tStartX=LM;
  doc.setFillColor(240,243,249);
  doc.rect(tStartX,y-3,pW-LM-RM,7,"F");
  let cx=tStartX;
  colDefs.forEach(c=>{
    txt(c.h,cx+1,y+1,{size:7.5,bold:true,color:"#333333"});
    cx+=c.w;
  });
  y+=6;
  line(LM,y,pW-RM,y,"#aaaaaa");y+=3;

  // Table rows
  items.forEach((item,idx)=>{
    const qr=+item.qty||0, rt=+item.rate||0, dc=+item.disc||0;
    const base=qr*rt*(1-dc/100);
    const gstAmt=base*(+item.gst||0)/100;
    const total=base+gstAmt;
    const descLines=doc.splitTextToSize(item.name+(item.desc?"\n"+item.desc:""),colDefs[1].w-2);
    const rowH=Math.max(6,descLines.length*4+2);
    // check page break
    if(y+rowH>270){doc.addPage();y=TM;}
    cx=tStartX;
    txt(String(idx+1),cx+1,y+4,{size:8});cx+=colDefs[0].w;
    descLines.forEach((dl,di)=>txt(dl,cx+1,y+4+di*3.8,{size:8.5,bold:di===0,color:di===0?"#111111":"#555555"}));cx+=colDefs[1].w;
    txt(item.hsn||"",cx+1,y+4,{size:7.5,color:"#555555"});cx+=colDefs[2].w;
    txt(String(qr)+(item.unit?" "+item.unit:""),cx+1,y+4,{size:8});cx+=colDefs[3].w;
    txt(pdfInr(rt),cx+1,y+4,{size:8});cx+=colDefs[4].w;
    if(hasDisc){txt(dc?dc+"%":"—",cx+1,y+4,{size:8});cx+=colDefs[5].w;}
    const taxIdx=hasDisc?6:5;
    txt(pdfInr(base),cx+1,y+4,{size:8});cx+=colDefs[taxIdx].w;
    txt((+item.gst||0)+"%",cx+1,y+4,{size:8});cx+=colDefs[taxIdx+1].w;
    txt(pdfInr(total),cx+1,y+4,{size:8,bold:true});
    y+=rowH;
    line(LM,y,pW-RM,y,"#e8eaf0");
  });

  y+=4;

  // ── TOTALS BLOCK (right) ──
  const totW=72, totX=pW-RM-totW;
  const addTotRow=(label,val,bold,big)=>{
    if(y>272){doc.addPage();y=TM;}
    txt(label,totX,y,{size:big?10:9,bold:bold,color:bold?"#111111":"#555555"});
    txt(val,pW-RM,y,{size:big?10:9,bold:bold,align:"right"});
    y+=big?6:5;
  };
  addTotRow("Taxable Value",pdfInr(t.taxable));
  if(inter){
    addTotRow("IGST",pdfInr(t.igst));
  } else {
    addTotRow("CGST",pdfInr(t.cgst));
    addTotRow("SGST",pdfInr(t.sgst));
  }
  if(t.roundoff)addTotRow("Round Off",(t.roundoff>0?"+":"")+pdfInr(t.roundoff));
  line(totX,y,pW-RM,y,"#333333");y+=4;
  addTotRow("Net Payable",pdfInr(t.net),true,true);
  if(inv.paid){
    addTotRow("Received",pdfInr(inv.paid));
    addTotRow("Balance Due",pdfInr(Math.max(0,t.net-inv.paid)),true);
  }

  // ── AMOUNT IN WORDS ──
  const leftY=y-20;
  if(leftY>0){
    txt("Amount in words:",LM,leftY,{size:7.5,bold:true,color:"#888888"});
    txt(numToWords(t.net)+" Only",LM,leftY+4,{size:8.5,italic:true,color:"#333333"});
  }

  // ── HSN BREAKUP ──
  if(inv.items&&inv.items.filter(x=>x.name).length){
    y+=6;
    if(y>255){doc.addPage();y=TM;}
    txt("SAC TAX BREAKUP",LM,y,{size:7.5,bold:true,color:"#0e7c70"});y+=5;
    const hsnMap={};
    inv.items.filter(x=>x.name).forEach(item=>{
      const key=(item.hsn||"N/A")+"|"+(+item.gst||0);
      if(!hsnMap[key])hsnMap[key]={hsn:item.hsn||"N/A",gst:+item.gst||0,taxable:0,cgst:0,sgst:0,igst:0,total:0};
      const base=(+item.qty||0)*(+item.rate||0)*(1-(+item.disc||0)/100);
      const gstAmt=base*(+item.gst||0)/100;
      hsnMap[key].taxable+=base;
      if(inter)hsnMap[key].igst+=gstAmt;
      else{hsnMap[key].cgst+=gstAmt/2;hsnMap[key].sgst+=gstAmt/2;}
      hsnMap[key].total+=base+gstAmt;
    });
    const hsnRows=Object.values(hsnMap);
    const hsnCols=inter
      ?[{h:"SAC",w:24},{h:"GST%",w:14},{h:"Taxable",w:28},{h:"IGST",w:24},{h:"Total",w:26}]
      :[{h:"SAC",w:22},{h:"GST%",w:14},{h:"Taxable",w:26},{h:"CGST",w:22},{h:"SGST",w:22},{h:"Total",w:22}];
    doc.setFillColor(238,242,251);
    doc.rect(LM,y-3,hsnCols.reduce((s,c)=>s+c.w,0),6,"F");
    let hx=LM;
    hsnCols.forEach(c=>{txt(c.h,hx+1,y+0.5,{size:7,bold:true,color:"#2a3a6a"});hx+=c.w;});
    y+=5;
    hsnRows.forEach(r=>{
      hx=LM;
      txt(r.hsn,hx+1,y,{size:8});hx+=hsnCols[0].w;
      txt(r.gst+"%",hx+1,y,{size:8});hx+=hsnCols[1].w;
      txt(pdfInr(r.taxable),hx+1,y,{size:8});hx+=hsnCols[2].w;
      if(inter){txt(pdfInr(r.igst),hx+1,y,{size:8});hx+=hsnCols[3].w;}
      else{txt(pdfInr(r.cgst),hx+1,y,{size:8});hx+=hsnCols[3].w;txt(pdfInr(r.sgst),hx+1,y,{size:8});hx+=hsnCols[4].w;}
      txt(pdfInr(r.total),hx+1,y,{size:8,bold:true});
      y+=5;line(LM,y-1,LM+hsnCols.reduce((s,c)=>s+c.w,0),y-1,"#e8eaf0");
    });
    y+=3;
  }

  // ── FOOTER: Terms & Signature ──
  if(y>260){doc.addPage();y=TM;}
  y=Math.max(y,240);
  line(LM,y,pW-RM,y,"#cccccc");y+=5;
  if(s.terms){
    txt("Terms & Conditions:",LM,y,{size:7.5,bold:true,color:"#888888"});y+=4;
    const tlines=doc.splitTextToSize(s.terms,100);
    tlines.slice(0,4).forEach(l=>{txt(l,LM,y,{size:7.5,color:"#666666"});y+=3.8;});
  }
  txt("For "+s.name,pW-RM,y-10||y,{size:9,bold:true,align:"right"});
  txt("Authorised Signatory",pW-RM,y+4,{size:8,color:"#666666",align:"right"});

  doc.save((inv.number||"invoice").replace(/\//g,"-")+".pdf");
  toast("PDF saved ✓ (text-selectable)");
}

function setPi(i,f,v){ pdraft.items[i][f]=["qty","rate","disc","gst"].includes(f)?(+v||0):v; parchiCalc(); }
function pickParchiParty(){
  const pid=document.getElementById("pn_party").value; if(!pid) return;
  const p=db.parties.find(x=>x.id===pid);
  pdraft.buyer.partyId=pid;
  if(document.getElementById("pn_name")) document.getElementById("pn_name").value=p.name||"";
  if(document.getElementById("pn_phone")) document.getElementById("pn_phone").value=p.phone||"";
  if(document.getElementById("pn_addr")) document.getElementById("pn_addr").value=p.address||"";
}
function parchiCalc(){
  const pos=document.getElementById("pn_pos")?document.getElementById("pn_pos").value:"";
  const inter=pos&&db.seller.state&&(pos.trim().toLowerCase()!==db.seller.state.trim().toLowerCase());
  pdraft.interstate=inter;
  let taxable=0,discount=0,cgst=0,sgst=0,igst=0;
  pdraft.items.forEach((it,idx)=>{
    const base=(+it.qty)*(+it.rate); const dis=base*(+it.disc||0)/100;
    const t=base-dis; const g=t*(+it.gst)/100;
    taxable+=t; discount+=dis;
    if(inter) igst+=g; else{cgst+=g/2;sgst+=g/2;}
    const amt=t+g; const el=document.getElementById("pi_amt_"+idx); if(el)el.textContent=inr(amt);
  });
  const net=Math.round(taxable+cgst+sgst+igst);
  pdraft.totals={taxable,discount,cgst,sgst,igst,net};
  pdraft.paid=+document.getElementById("pn_paid").value||0;
  const tb=document.getElementById("pTotBox");
  if(tb) tb.innerHTML=`
    <div class="l">Sub Total <b>${inr(taxable+cgst+sgst+igst)}</b></div>
    <div class="l">Taxable <b>${inr(taxable)}</b></div>
    ${inter?`<div class="l">IGST <b>${inr(igst)}</b></div>`:`<div class="l">CGST <b>${inr(cgst)}</b></div><div class="l">SGST <b>${inr(sgst)}</b></div>`}
    ${discount?`<div class="l" style="color:var(--green)">You Saved <b>- ${inr(discount)}</b></div>`:""}
    <div class="l grand">Total <b>${inr(net)}</b></div>
    <div class="l">Balance <b>${inr(Math.max(0,net-pdraft.paid))}</b></div>`;
}
function saveParchi(){
  pdraft.number=val("pn_no"); pdraft.date=val("pn_date");
  pdraft.buyer.placeOfSupply=val("pn_pos");
  pdraft.buyer.name=val("pn_name"); pdraft.buyer.phone=val("pn_phone");
  pdraft.buyer.address=val("pn_addr"); pdraft.buyer.shipName=val("pn_ship");
  pdraft.buyer.shipAddress=val("pn_shipaddr");
  pdraft.notes=val("pn_notes"); pdraft.paid=+val("pn_paid")||0;
  const lt=document.getElementById("pnLedger");
  if(lt) pdraft.linkLedger=!lt.classList.contains("off");
  if(!pdraft.buyer.name){toast("Party name is required");return;}
  if(!pdraft.items.some(it=>it.name&&+it.qty>0)){toast("Add at least one item");return;}
  parchiCalc();
  // Auto-create party
  if(!pdraft.buyer.partyId && pdraft.buyer.name){
    const ex=db.parties.find(p=>p.name.toLowerCase()===pdraft.buyer.name.toLowerCase());
    if(ex) pdraft.buyer.partyId=ex.id;
    else{ const np={id:id(),name:pdraft.buyer.name,phone:pdraft.buyer.phone,address:pdraft.buyer.address,gstin:"",pan:"",state:"",stateCode:"",creditLimit:0,creditDays:0}; db.parties.push(np); pdraft.buyer.partyId=np.id; }
  }
  if(!db.parchas) db.parchas=[];
  const isNew=!db.parchas.some(x=>x.id===pdraft.id);
  if(isNew){ db.parchas.push(JSON.parse(JSON.stringify(pdraft))); if(pdraft.number===nextParchiNo())db.parchaCounter=(db.parchaCounter||1)+1; else db.parchaCounter=(db.parchaCounter||1)+1; }
  else{ const i=db.parchas.findIndex(x=>x.id===pdraft.id); db.parchas[i]=JSON.parse(JSON.stringify(pdraft)); }
  saveDB(); toast("Parchi saved"); renderParchi();
}
