// Extend importCSV to handle new types
const _origImportCSV = importCSV;
window.importCSV = function(type, input) {
  if (!['sales','purchases','bank'].includes(type)) { _origImportCSV(type, input); return; }
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const rows = parseCSV(e.target.result);
      if (rows.length < 2) { showImportResult(type,'No data rows found.','red'); return; }
      const headers = rows[0].map(h => h.trim().toLowerCase().replace(/[\s_]/g,''));
      const data = rows.slice(1).filter(r => r.some(c => c.trim()));
      const get = (row, col) => { const i = headers.indexOf(col); return i>=0?(row[i]||'').trim():''; };
      let added=0, skipped=0, errors=[];

      if (type === 'sales') {
        data.forEach((row, ri) => {
          const invNo = get(row,'invoiceno'); if (!invNo) { skipped++; return; }
          if (db.invoices.some(x => x.number.toUpperCase()===invNo.toUpperCase())) { skipped++; return; }
          const buyerName = get(row,'buyername'); if (!buyerName) { skipped++; return; }
          const buyerGstin = get(row,'buyergstin').toUpperCase();
          if (buyerGstin && !validGSTIN(buyerGstin)) { errors.push(`Row ${ri+2}: Invalid buyer GSTIN`); skipped++; return; }
          const qty = +get(row,'qty')||1, rate = +get(row,'rate')||0, disc = +get(row,'disc')||0, gstRate = +get(row,'gstrate')||0;
          const taxable = qty*rate*(1-disc/100);
          const gstAmt = taxable*gstRate/100;
          const buyerState = get(row,'buyerstate');
          const inter = buyerState && db.seller.state && buyerState.toLowerCase()!==db.seller.state.toLowerCase();
          const cgst = inter?0:gstAmt/2, sgst = inter?0:gstAmt/2, igst = inter?gstAmt:0;
          const net = Math.round(taxable+gstAmt);
          // auto-create party
          let partyId = '';
          const existing = db.parties.find(p=>p.name.toLowerCase()===buyerName.toLowerCase());
          if (existing) { partyId = existing.id; }
          else { const np={id:id(),name:buyerName,gstin:buyerGstin,state:buyerState,phone:get(row,'buyerphone')}; db.parties.push(np); partyId=np.id; }
          db.invoices.push({
            id:id(), number:invNo, date:get(row,'date')||today(), due:'', placeOfSupply:buyerState||db.seller.state,
            reverse:'No', eway:'', vehicle:'', template:'classic',
            buyer:{partyId,name:buyerName,address:'',gstin:buyerGstin,pan:'',state:buyerState,stateCode:'',phone:get(row,'buyerphone'),email:''},
            items:[{pid:'',name:get(row,'itemname')||'Item',hsn:'',desc:'',unit:'PCS',qty,rate,disc,gst:gstRate}],
            discountIsPct:true, paid:+get(row,'paid')||0, interstate:inter, linkLedger:true,
            totals:{taxable,cgst,sgst,igst,roundoff:net-(taxable+gstAmt),net}
          });
          db.invCounter = Math.max(db.invCounter||1, (db.invoices.length));
          added++;
        });
      }

      if (type === 'purchases') {
        if (!db.purchaseInvoices) db.purchaseInvoices = [];
        data.forEach((row, ri) => {
          const billNo = get(row,'billno'); if (!billNo) { skipped++; return; }
          if (db.purchaseInvoices.some(x=>(x.billNo||'').toUpperCase()===billNo.toUpperCase())) { skipped++; return; }
          const supName = get(row,'suppliername'); if (!supName) { skipped++; return; }
          const qty=+get(row,'qty')||1, rate=+get(row,'rate')||0, disc=+get(row,'disc')||0, gstRate=+get(row,'gstrate')||0;
          const taxable=qty*rate*(1-disc/100); const gstAmt=taxable*gstRate/100;
          const supState=get(row,'supplierstate');
          const inter=supState&&db.seller.state&&supState.toLowerCase()!==db.seller.state.toLowerCase();
          const cgst=inter?0:gstAmt/2, sgst=inter?0:gstAmt/2, igst=inter?gstAmt:0;
          const net=Math.round(taxable+gstAmt);
          let partyId='';
          const existing=db.parties.find(p=>p.name.toLowerCase()===supName.toLowerCase());
          if(existing){partyId=existing.id;}
          else{const np={id:id(),name:supName,gstin:get(row,'suppliergstin').toUpperCase(),state:supState}; db.parties.push(np); partyId=np.id;}
          const pid=id();
          db.purchaseInvoices.push({
            id:pid, billNo, date:get(row,'date')||today(), due:'',
            supplierName:supName, supplierPartyId:partyId,
            supplierGstin:get(row,'suppliergstin').toUpperCase(), supplierState:supState,
            supplierAddress:'', interstate:inter, linkLedger:true, paid:+get(row,'paid')||0,
            items:[{pid:'',name:get(row,'itemname')||'Item',hsn:'',unit:'PCS',qty,rate,disc,gst:gstRate}],
            totals:{taxable,cgst,sgst,igst,roundoff:net-(taxable+gstAmt),net}
          });
          if(partyId) db.vouchers.push({id:id(),type:'purInvoice',dir:'in',mode:'bill',date:get(row,'date')||today(),partyId,purInvoiceId:pid,taxable,tax:gstAmt,amount:net,linkLedger:true,narration:`Purchase Bill ${billNo} · ${supName}`});
          added++;
        });
      }

      if (type === 'bank') {
        data.forEach((row, ri) => {
          const amt = +get(row,'amount')||0; if (!amt) { skipped++; return; }
          const dir = (get(row,'direction')||'in').toLowerCase().trim();
          if (!['in','out'].includes(dir)) { errors.push(`Row ${ri+2}: Direction must be 'in' or 'out'`); skipped++; return; }
          const baName = get(row,'bankaccountname');
          let ba = (db.bankAccounts||[]).find(b=>b.name.toLowerCase()===baName.toLowerCase());
          if (!ba && baName) { ba={id:id(),name:baName,accountNo:'',ifsc:'',branch:'',openingBalance:0}; if(!db.bankAccounts)db.bankAccounts=[]; db.bankAccounts.push(ba); }
          const partyNameStr = get(row,'party');
          let partyId='';
          if (partyNameStr) { const p=db.parties.find(x=>x.name.toLowerCase()===partyNameStr.toLowerCase()); if(p)partyId=p.id; }
          db.vouchers.push({id:id(),type:'receipt',dir,mode:'bank',bankAccountId:ba?.id||null,
            date:get(row,'date')||today(), partyId, amount:amt,
            narration:get(row,'narration')||'', linkLedger:true});
          added++;
        });
      }

      saveDB();
      const msg = `✓ Added: ${added} &nbsp;| Skipped: ${skipped}${errors.length?`<br><span style="color:var(--red)">${errors.slice(0,3).join('<br>')}</span>`:''}`;
      showImportResult(type, msg, added?'green':'amber');
      toast(`Imported ${added} ${type} records`);
    } catch(err) {
      showImportResult(type, 'Error: '+err.message, 'red');
    }
    input.value = '';
  };
  reader.readAsText(file);
};

// ─── Shared styled-sheet builder ─────────────────────────────────────────
function _styledRegister(XLS, wb, sheetName, title, subtitle, cols, colWidths, headerRow, dataRows, totRow) {
  const {FL,FN,AL,BD,BDM,NAVY,NAVY2,WHITE,STRIPE,TOTBG,DRK,GOLD} = _gstStyles();
  const ws={}, ms=[], ncols=cols.length;
  const SC=(r,c,v,st,fmt)=>_setCell(ws,XLS,r,c,v,st,fmt);
  const MG=(r1,c1,r2,c2)=>_mg(ms,r1,c1,r2,c2);

  // Banner rows
  MG(1,1,1,ncols);
  SC(1,1,title,{font:FN(true,14,WHITE),fill:FL(NAVY),alignment:AL('center','center')});
  MG(2,1,2,ncols);
  SC(2,1,subtitle,{font:FN(false,9,'AAAAAA'),alignment:AL('center','center')});
  MG(3,1,3,ncols);
  SC(3,1,'',{fill:FL(GOLD)});

  // Business info row
  MG(4,1,4,Math.floor(ncols/2));
  SC(4,1,`${db.seller.name}   ·   GSTIN: ${db.seller.gstin||'—'}   ·   ${db.seller.state||''}`,{font:FN(true,9),fill:FL('EBF0FA'),alignment:AL('left','center'),border:BD()});
  MG(4,Math.floor(ncols/2)+1,4,ncols);
  SC(4,Math.floor(ncols/2)+1,`Phone: ${db.seller.phone||'—'}   ·   Generated: ${today()}`,{font:FN(false,9),fill:FL('EBF0FA'),alignment:AL('right','center'),border:BD()});

  // Column headers (row 6)
  headerRow.forEach((h,i) => {
    const isNum = colWidths && i >= Math.floor(ncols*0.55);
    SC(6,i+1,h,{font:FN(true,9,WHITE),fill:FL(NAVY2),alignment:AL('center','center',true),
      border:{top:{style:'medium',color:{rgb:'C0C8D8'}},bottom:{style:'medium',color:{rgb:'C0C8D8'}},left:{style:'thin',color:{rgb:'C0C8D8'}},right:{style:'thin',color:{rgb:'C0C8D8'}}}});
  });

  // Data rows (start row 7)
  let r = 7;
  dataRows.forEach((row, ri) => {
    const bg = ri%2===0 ? FL('F4F7FD') : undefined;
    row.forEach((v, ci) => {
      const isNum = typeof v === 'number';
      SC(r, ci+1, v===null?'':v, {
        font: FN(false,9),
        fill: bg,
        alignment: AL(isNum?'right':'left','center'),
        border: {top:{style:'thin',color:{rgb:'D8E2EF'}},bottom:{style:'thin',color:{rgb:'D8E2EF'}},left:{style:'thin',color:{rgb:'D8E2EF'}},right:{style:'thin',color:{rgb:'D8E2EF'}}}
      }, isNum?'#,##0.00':undefined);
    });
    r++;
  });

  // Totals row
  if (totRow) {
    totRow.forEach((v, ci) => {
      const isNum = typeof v === 'number';
      SC(r, ci+1, v===null?'':v, {
        font: FN(true,10),
        fill: FL(TOTBG),
        alignment: AL(isNum?'right':'left','center'),
        border: {top:{style:'medium',color:{rgb:'8090B0'}},bottom:{style:'medium',color:{rgb:'8090B0'}},left:{style:'thin',color:{rgb:'C0C8D8'}},right:{style:'thin',color:{rgb:'C0C8D8'}}}
      }, isNum?'#,##0.00':undefined);
    });
  }

  const finalR = totRow ? r : r-1;
  _finishWS(ws,XLS,finalR,ncols,ms,
    colWidths || Array(ncols).fill(16),
    [{hpt:26},{hpt:14},{hpt:4},{hpt:16},{hpt:0},{hpt:28},...Array(dataRows.length).fill(18),(totRow?{hpt:22}:null)].filter(Boolean));
  ws['!freeze']={xSplit:0,ySplit:6};
  XLS.utils.book_append_sheet(wb, ws, sheetName.slice(0,31));
}

/* =========================================================================
   ☁  CLOUD SYNC  — Google Sheet backend (added for live/hosted use)
   Keeps the existing offline localStorage behaviour, and additionally
   mirrors the full database to a Google Apps Script Web App.
   ========================================================================= */
(function(){
  const URL_KEY="ll_cloud_url", SEC_KEY="ll_cloud_secret";
  const getUrl=()=>localStorage.getItem(URL_KEY)||"";
  const getSec=()=>localStorage.getItem(SEC_KEY)||"";
  const configured=()=>!!getUrl()&&!!getSec();

  // keep a handle to the original (localStorage-only) save
  const _saveLocal=saveDB;
  let pushTimer=null, busy=false;

  function setStatus(state,text){
    const dot=document.getElementById("ll_cloud_dot");
    const lbl=document.getElementById("ll_cloud_lbl");
    if(!dot||!lbl)return;
    const colors={off:"#7a948d",ok:"#37d39b",sync:"#e0b341",err:"#ff6b81"};
    dot.style.background=colors[state]||colors.off;
    lbl.textContent=text;
  }

  // push the whole db to the Sheet (debounced)
  function cloudPush(){
    if(!configured())return;
    clearTimeout(pushTimer);
    setStatus("sync","Cloud: saving…");
    pushTimer=setTimeout(async()=>{
      try{
        busy=true;
        const res=await fetch(getUrl(),{
          method:"POST",
          // NB: no JSON Content-Type header on purpose -> avoids CORS preflight
          body:JSON.stringify({key:getSec(),data:db})
        });
        const j=await res.json();
        if(j.ok){ setStatus("ok","Cloud: saved ✓"); }
        else   { setStatus("err","Cloud: "+(j.error||"error")); }
      }catch(e){ setStatus("err","Cloud: offline"); }
      finally{ busy=false; }
    },1200);
  }

  // override save: write locally first (instant), then sync up
  saveDB=function(){ _saveLocal(); cloudPush(); };

  // pull latest from the Sheet; returns true if data was loaded
  async function cloudPull(silent){
    if(!configured()){ if(!silent)toast("Set up cloud sync first"); return false; }
    setStatus("sync","Cloud: loading…");
    try{
      const res=await fetch(getUrl()+"?key="+encodeURIComponent(getSec()));
      const j=await res.json();
      if(j.ok){
        if(j.data&&j.data.seller){
          db=j.data; _saveLocal();           // refresh local cache, no re-push
          if(window.go&&window.current)go(current); else go("dashboard");
          setStatus("ok","Cloud: loaded ✓");
          if(!silent)toast("Loaded latest from cloud");
          return true;
        }
        setStatus("ok","Cloud: empty");      // connected, nothing saved yet
        if(!silent)toast("Cloud is empty — your data will fill it on next save");
        return false;
      }
      setStatus("err","Cloud: "+(j.error||"error"));
      if(!silent)toast("Cloud error: "+(j.error||"unknown"));
    }catch(e){ setStatus("err","Cloud: offline"); if(!silent)toast("Could not reach cloud"); }
    return false;
  }
  window.cloudPull=()=>cloudPull(false);
  window.cloudPushNow=()=>{ if(!configured()){toast("Set up cloud sync first");return;} cloudPush(); };

  // first-time setup via simple prompts
  window.cloudSetup=async function(){
    const url=prompt("Paste your Google Apps Script Web App URL\n(ends with /exec):",getUrl());
    if(url===null)return;
    const sec=prompt("Enter your Secret (must match SECRET in the script):",getSec());
    if(sec===null)return;
    localStorage.setItem(URL_KEY,url.trim());
    localStorage.setItem(SEC_KEY,sec.trim());
    toast("Saved. Testing connection…");
    // check what is already in the cloud
    const had=await cloudPull(true);
    if(had){
      toast("Connected — loaded existing cloud data ✓");
    }else if(configured()){
      // cloud empty or unreachable: try to seed it with this device's data
      cloudPush();
      toast("Connected — this device's data will be uploaded ✓");
    }
  };
  window.cloudDisconnect=function(){
    if(!confirm("Disconnect cloud sync on this device? Local data stays."))return;
    localStorage.removeItem(URL_KEY); localStorage.removeItem(SEC_KEY);
    setStatus("off","Cloud: off"); toast("Cloud sync disconnected");
  };

  // inject the little control panel into the sidebar
  function injectUI(){
    const foot=document.querySelector(".side .foot");
    if(!foot)return;
    const box=document.createElement("div");
    box.style.cssText="margin-top:10px;border-top:1px solid rgba(255,255,255,.1);padding-top:10px";
    box.innerHTML=
      '<div style="font-size:11px;color:#7a948d;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;gap:7px">'+
        '<span id="ll_cloud_dot" style="width:9px;height:9px;border-radius:50%;background:#7a948d;display:inline-block"></span>'+
        '<span id="ll_cloud_lbl">Cloud: off</span></div>'+
      '<button onclick="cloudSetup()">☁ Cloud setup</button>'+
      '<button onclick="cloudPushNow()">⟳ Sync now</button>'+
      '<button onclick="cloudPull()">⬇ Load from cloud</button>'+
      '<button onclick="cloudDisconnect()">⤬ Disconnect</button>';
    foot.appendChild(box);
  }
  injectUI();

  // on startup: if configured, quietly pull the latest from the Sheet
  if(configured()){ setStatus("ok","Cloud: on"); cloudPull(true); }
  else setStatus("off","Cloud: off");
})();

</script>
