  const rows=items.map((it,n)=>{

  return `<div class="parchi">
    <div class="ph"><h2>${esc(s.name)}</h2>
      <p>${esc(s.address)}${s.city?", "+esc(s.city):""}, ${esc(s.state)}</p>
      <p>Phone No : ${esc(s.phone||"")}${s.email?" | "+esc(s.email):""}</p>

      <div><b>Date</b> : ${fmtDate(p.date)}</div>
      <div><b>Bill To</b> : ${esc(p.buyer.name)}</div>
      ${p.buyer.phone?`<div><b>Ph.</b> : ${esc(p.buyer.phone)}</div>`:""}
      ${p.buyer.address?`<div>${esc(p.buyer.address)}</div>`:""}
      <div><b>Place of Supply</b> : ${esc(p.buyer.placeOfSupply||"")}</div>
      ${(p.buyer.shipName||p.buyer.shipAddress)?`<div style="margin-top:6px;border-top:1px dashed #aaa;padding-top:6px"><b>Ship To</b> : ${esc(p.buyer.shipName||"")} ${esc(p.buyer.shipAddress||"")}</div>`:""}
    </div>
    <table class="pit"><thead><tr><th>#</th><th>Item</th><th class="t-r">Qty</th><th class="t-r">Rate</th><th class="t-r">Amt</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td colspan="2" class="t-r"><b>Sub Total</b></td><td class="t-r">-</td><td></td><td class="t-r"><b>${inr(t.taxable+t.cgst+t.sgst+t.igst)}</b></td></tr></tfoot>
    </table>
    <div class="psummary">
      <div class="pl"><span>Taxable Amount</span><span>${inr(t.taxable)}</span></div>
      ${gstRows}
      <div class="pl bold"><span>Total</span><span>${inr(t.net)}</span></div>
      ${t.discount?`<div class="pl saved"><span>You Saved</span><span>- ${inr(t.discount)}</span></div>`:""}
      <div class="pl"><span>Received</span><span>${inr(p.paid||0)}</span></div>

/* ─── Load xlsx-js-style lazily (shared by all XLSX exports) ─────────── */
async function _ensureXLS(){
  if(window.XLSXStyle) return window.XLSXStyle;
  if(window.XLSX) return window.XLSX;
  return new Promise((ok,fail)=>{
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx-js-style.min.js";
    s.onload=()=>ok(window.XLSXStyle||window.XLSX);
    s.onerror=()=>{ const s2=document.createElement("script"); s2.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"; s2.onload=()=>ok(window.XLSX); s2.onerror=fail; document.head.appendChild(s2); };
    document.head.appendChild(s);
  });
}

/* ─── Shared style helpers ───────────────────────────────────────────── */
function _gstStyles(){
  const NAVY="1F3864",NAVY2="2E5BDC",GOLD="C9A227",WHITE="FFFFFF",
        HBLU="2E5BDC",LBG="EBF0FA",STRIPE="EBF4FF",TOTBG="FCE4D6",
        GREEN_BG="C6EFCE",GREEN_H="375623",RED_BG="FFC7CE",DRK="1A2744",
        BDC="C0C8D8",GREY="F2F2F2",WARN="FFEB9C",WARNF="9C5700",
        H2="BDD7EE",LGREEN="E2EFDA",LGOLD="FFF2CC";
  const FL=h=>({patternType:"solid",fgColor:{rgb:h}});
  const FN=(b=false,sz=10,col=DRK)=>({bold:b,sz,color:{rgb:col},name:"Arial"});
  const AL=(h="left",v="center",w=false)=>({horizontal:h,vertical:v,wrapText:w});
  const S=(st="thin")=>({style:st,color:{rgb:BDC}});
  const BD=()=>{const b=S(); return{top:b,bottom:b,left:b,right:b};};
  const BDM=()=>{ const t=S("medium"),n=S("thin"); return{top:t,bottom:t,left:n,right:n}; };
  return {NAVY,NAVY2,GOLD,WHITE,HBLU,LBG,STRIPE,TOTBG,GREEN_BG,GREEN_H,
          RED_BG,DRK,BDC,GREY,WARN,WARNF,H2,LGREEN,LGOLD,FL,FN,AL,S,BD,BDM};
}

function _ws(XLS){ return {}; } // blank worksheet object

function _setCell(ws,XLS,r,c,v,style,fmt){
  const addr=XLS.utils.encode_cell({r:r-1,c:c-1});
  const isNum=typeof v==="number";
  ws[addr]={v:v===null||v===undefined?"":v, t:isNum?"n":"s", s:style};
  if(fmt) ws[addr].z=fmt;
}
function _mg(merges,r1,c1,r2,c2){ merges.push({s:{r:r1-1,c:c1-1},e:{r:r2-1,c:c2-1}}); }
function _finishWS(ws,XLS,maxR,maxC,merges,cols,rows){
  ws["!ref"]=XLS.utils.encode_range({r:0,c:0},{r:maxR-1,c:maxC-1});
  ws["!merges"]=merges;
  if(cols) ws["!cols"]=cols.map(w=>({wch:w}));
  if(rows) ws["!rows"]=rows.map(h=>h?{hpt:h}:{});
}

  DROW(cur,"(i)","Total Tax Payable (from 3.1 above)",0,outIGST,outCGST,outSGST,0,STRIPE); cur++;
  DROW(cur,"(ii)","Less: ITC Utilized — Integrated Tax",0,Math.min(itcIGST,outIGST),0,0,0,GREEN_BG,false,GREEN_H); cur++;
  DROW(cur,"(ii)","Less: ITC Utilized — Central Tax",0,0,0,0,0,LGREEN,false,GREEN_H); cur++;
  DROW(cur,"(ii)","Less: ITC Utilized — State/UT Tax",0,0,0,0,0,LGREEN,false,GREEN_H); cur++;
  DROW(cur,"(iii)","Net Tax Payable through Cash Ledger",0,netIGST,outCGST,outSGST,0,RED_BG,true,"C00000"); cur++;
  BLANK(cur); cur++;

  /* Summary box */
  SECHDR(cur,"TAX SUMMARY — "+ml,NAVY); cur++;
  for(const[r,lbl,v,clr] of[
    [cur,"Output Tax (IGST + CGST + SGST)",outIGST+outCGST+outSGST,DRK],
    [cur+1,"Input Tax Credit (ITC) Available",itcIGST,"375623"],
    [cur+2,"Net Tax Payable in Cash",Math.max(0,liability-totalITC),"C00000"]
  ]){
    SC(r,2,lbl,{font:FN(true,10),fill:FL(r===cur+2?RED_BG:r===cur+1?GREEN_BG:GREY),alignment:AL("left","center"),border:BD()});
    SC(r,3,v,{font:FN(true,11,clr),fill:FL(r===cur+2?RED_BG:r===cur+1?GREEN_BG:GREY),alignment:AL("right","center"),border:BD()},"#,##0.00");
    for(const c of[1,4,5,6,7]) SC(r,c,"",{fill:FL(r===cur+2?RED_BG:r===cur+1?GREEN_BG:GREY),border:BD()});
  }
  cur+=3;

  _finishWS(ws,XLS,cur,7,ms,cols);
  XLS.utils.book_append_sheet(wb,ws,"GSTR-3B");
  XLS.writeFile(wb,"GSTR3B_"+month+".xlsx");
  toast("✓ GSTR-3B Excel exported — all 6 sections (3.1 to 6.1)");
}

function exportTransactions(){
  let csv="Date,Type,Party,Mode,In,Out,TDS,Narration\n";
  db.vouchers.slice().sort((a,b)=>(a.date||"").localeCompare(b.date||"")).forEach(v=>{
    const party=v.partyId?partyName(v.partyId):"";
    let typ=v.type,inn=0,out=0;
    if(v.type==="manual"){ inn=v.cr||0; out=v.dr||0; typ="Journal"; }
    else if(v.type==="purInvoice"){ out=0; typ="Purchase"; }
    else { inn=v.dir==="in"?v.amount:0; out=v.dir==="out"?v.amount:0; typ=v.dir==="in"?"Receipt":"Payment"; }
    csv+=[v.date||"",typ,csvq(party),v.mode||"",inn||"",out||"",v.tds||"",csvq(v.narration||"")].join(",")+"\n";
  });
  downloadFile("transactions_"+today()+".csv","text/csv;charset=utf-8","\uFEFF"+csv); toast("Transactions exported");
}

/* ---- CSV Import ---- */
function importCSV(type, input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const rows=parseCSV(e.target.result);
      if(rows.length<2){ showImportResult(type,"No data rows found.","red"); return; }
      const headers=rows[0].map(h=>h.trim().toLowerCase().replace(/\s+/g,""));
      const data=rows.slice(1).filter(r=>r.some(c=>c.trim()));
      let added=0, skipped=0, errors=[];
      if(type==="parties"){
        data.forEach((row,ri)=>{
          const get=col=>{ const i=headers.indexOf(col); return i>=0?(row[i]||"").trim():""; };
          const name=get("name"); if(!name){skipped++;return;}
          if(db.parties.find(p=>p.name.toLowerCase()===name.toLowerCase())){skipped++;return;}
          const gstin=get("gstin").toUpperCase();
          if(gstin&&!validGSTIN(gstin)){errors.push(`Row ${ri+2}: Invalid GSTIN '${gstin}'`);skipped++;return;}
          const st=gstin?stateFromGSTIN(gstin):null;
          db.parties.push({id:id(),name,gstin,pan:get("pan").toUpperCase(),address:get("address"),
            state:get("state")||(st?st.name:""),stateCode:get("statecode")||(st?st.code:""),
            phone:get("phone"),email:get("email"),
            creditLimit:+get("creditlimit")||0,creditDays:+get("creditdays")||0});
          added++;
        });
      }
      if(type==="products"){
        data.forEach((row,ri)=>{
          const get=col=>{ const i=headers.indexOf(col); return i>=0?(row[i]||"").trim():""; };
          const name=get("name"); if(!name){skipped++;return;}
          if(db.products.find(p=>p.name.toLowerCase()===name.toLowerCase())){skipped++;return;}
          db.products.push({id:id(),name,sku:get("sku"),barcode:get("barcode"),hsn:get("hsn"),
            category:get("category"),brand:get("brand"),unit:get("unit")||"Visit",
            gst:+get("gstrate")||18,purchase:+get("purchaserate")||0,sale:+get("salerate")||0,
            reorder:+get("reorderlevel")||0,stock:+get("openingstock")||0});
          added++;
        });
      }
      if(type==="balances"){
        data.forEach((row,ri)=>{
          const get=col=>{ const i=headers.indexOf(col); return i>=0?(row[i]||"").trim():""; };
          const name=get("partyname"); if(!name){skipped++;return;}
          const party=db.parties.find(p=>p.name.toLowerCase()===name.toLowerCase());
          if(!party){errors.push(`Row ${ri+2}: Party '${name}' not found — add party first`);skipped++;return;}
          const dr=+get("dramount")||0; const cr=+get("cramount")||0;
          if(!dr&&!cr){skipped++;return;}
          db.vouchers.push({id:id(),type:"manual",date:get("date")||today(),
            partyId:party.id,dr,cr,narration:get("narration")||"Opening Balance",mode:"manual",linkLedger:true});
          added++;
        });
      }
      if(type==="receipts"||type==="payments"){
        const dir=type==="receipts"?"in":"out";
        data.forEach((row,ri)=>{
          const get=col=>{ const i=headers.indexOf(col); return i>=0?(row[i]||"").trim():""; };
          const amt=+get("amount")||0; const tds=+get("tds")||0;
          if(!amt&&!tds){skipped++;return;}
          const pname=get("party"); let party=pname?db.parties.find(p=>p.name.toLowerCase()===pname.toLowerCase()):null;
          if(pname&&!party){ party={id:id(),name:pname}; db.parties.push(party); }
          const mode=(get("mode")||"cash").toLowerCase().includes("bank")?"bank":"cash";
          db.vouchers.push({id:id(),type:"receipt",dir,mode,bankAccountId:mode==="bank"?"bank_default":null,
            date:get("date")||today(),partyId:party?party.id:"",amount:amt,tds,tdsSection:get("section")||"",
            narration:get("narration")||"",linkLedger:true});
          added++;
        });
      }
      if(type==="ledgerentries"){
        data.forEach((row,ri)=>{
          const get=col=>{ const i=headers.indexOf(col); return i>=0?(row[i]||"").trim():""; };
          const name=get("partyname")||get("party");
          const party=name?db.parties.find(p=>p.name.toLowerCase()===name.toLowerCase()):null;
          const dr=+get("dramount")||+get("dr")||0; const cr=+get("cramount")||+get("cr")||0;
          if(!dr&&!cr){skipped++;return;}
          db.vouchers.push({id:id(),type:"manual",date:get("date")||today(),
            partyId:party?party.id:null,dr,cr,narration:get("narration")||"Imported entry",ref:get("ref"),mode:"manual",linkLedger:true});
          added++;
        });
      }
      if(type==="creditnotes"||type==="debitnotes"){
        if(!db.credNotes)db.credNotes=[];
        const noteType=type==="creditnotes"?"credit":"debit";
        data.forEach((row,ri)=>{
          const get=col=>{ const i=headers.indexOf(col); return i>=0?(row[i]||"").trim():""; };
          const amt=+get("amount")||0; const cname=get("client")||get("party"); if(!amt||!cname){skipped++;return;}
          db.credNotes.push({id:id(),number:get("noteno")||((noteType==="credit"?"CN":"DN")+"/"+fy(today())+"/"+String(db.credNotes.length+1).padStart(4,"0")),
            noteType,date:get("date")||today(),againstInvoice:get("againstinvoice")||"",reason:get("reason")||"",
            buyer:{name:cname,gstin:get("gstin")||"",state:get("state")||""},
            items:[],totals:{taxable:amt,cgst:0,sgst:0,igst:0,roundoff:0,net:amt},interstate:false});
          added++;
        });
      }
      saveDB();
      const msg=`✓ Added: ${added} &nbsp;| Skipped: ${skipped}${errors.length?`<br><span style="color:var(--red)">${errors.slice(0,3).join("<br>")}</span>`:""}`;
      showImportResult(type,msg,added?"green":"amber");
      toast(`Imported ${added} ${type}`);
    }catch(err){ showImportResult(type,"Error parsing CSV: "+err.message,"red"); }
    input.value="";
  };
  reader.readAsText(file);
}
function parseCSV(text){
  const rows=[]; const lines=text.replace(/\r/g,"").split("\n");
  lines.forEach(line=>{ if(!line.trim()) return;
    const cols=[]; let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"') inQ=!inQ;
      else if(line[i]===","&&!inQ){ cols.push(cur); cur=""; }
      else cur+=line[i];
    }
    cols.push(cur); rows.push(cols);
  });
  return rows;
}
function showImportResult(type,msg,color){
  const el=document.getElementById("imp_"+type+"_result");
  if(el) el.innerHTML=`<div style="padding:8px 12px;border-radius:7px;background:var(--${color==="green"?'green-bg':color==="red"?'red-bg':'amber-bg'});color:var(--${color==="green"?'green':color==="red"?'red':'accent'})">${msg}</div>`;
}

/* ---- CSV Exports ---- */
function downloadFile(name,mime,content){
  const blob=new Blob([content],{type:mime});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
/* ─── Party ledger entries helper ────────────────────────────────────── */
function getPartyLedgerEntries(pid){
  const entries=[];
  db.invoices.filter(i=>i.buyer.partyId===pid&&i.linkLedger!==false).forEach(i=>{
    entries.push({type:"Invoice",date:i.date,vno:i.number,particulars:"Sales Invoice",dr:i.totals.net,cr:0});
    if((i.paid||0)>0) entries.push({type:"Receipt",date:i.date,vno:i.number+"-REC",particulars:"Payment received",dr:0,cr:i.paid});
  });
  (db.parchas||[]).filter(p=>p.buyer.partyId===pid&&p.linkLedger!==false).forEach(p=>{
    entries.push({type:"Parchi",date:p.date,vno:p.number,particulars:"Quick Receipt",dr:p.totals.net,cr:0});
    if((p.paid||0)>0) entries.push({type:"Receipt",date:p.date,vno:p.number+"-PAY",particulars:"Payment on Receipt",dr:0,cr:p.paid});
  });
  db.vouchers.filter(v=>v.partyId===pid&&v.linkLedger!==false).forEach(v=>{
    if(v.type==="purchase") entries.push({type:"Purchase",date:v.date,vno:"PUR"+(v.bill?"/"+v.bill:""),particulars:"Purchase Bill"+(v.narration?" · "+v.narration:""),dr:0,cr:v.amount});
    else if(v.type==="manual") entries.push({type:"Journal",date:v.date,vno:"JRN"+(v.ref?"/"+v.ref:""),particulars:v.narration||"Journal Entry",dr:v.dr||0,cr:v.cr||0});
    else{ const inn=v.dir==="in"; entries.push({type:inn?"Receipt":"Payment",date:v.date,vno:v.mode||"",particulars:(inn?"Received":"Paid")+(v.narration?" · "+v.narration:""),dr:inn?0:v.amount,cr:inn?v.amount:0}); }
  });
  entries.sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  return entries;
}

/* ─── Styled XLSX export ─────────────────────────────────────────────── */
async function exportPartyLedgers(){
  const sel=[...document.querySelectorAll(".exp-party:checked")].map(c=>c.value);
  if(!sel.length){toast("Select at least one party");return;}
  toast("Preparing Excel file…");

  /* Lazy-load xlsx-js-style (SheetJS + cell styles) */
  if(!window.XLSXStyle){
    await new Promise((ok,fail)=>{
      const s=document.createElement("script");
      s.src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx-js-style.min.js";
      s.onload=ok;
      s.onerror=()=>{ /* fallback to plain SheetJS */ const s2=document.createElement("script"); s2.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"; s2.onload=ok; s2.onerror=fail; document.head.appendChild(s2); };
      document.head.appendChild(s);
    });
  }

  const XLS=window.XLSXStyle||window.XLSX;
  const wb=XLS.utils.book_new();
  sel.forEach(pid=>_buildLedgerSheet(XLS,wb,pid));
  XLS.writeFile(wb,"Party_Ledgers_"+today()+".xlsx");
  toast("✓ "+sel.length+" ledger(s) exported as Excel");
}

function _buildLedgerSheet(XLS,wb,pid){
  const party=db.parties.find(x=>x.id===pid); if(!party) return;
  const s=db.seller;
  const entries=getPartyLedgerEntries(pid);
  const ws={};
  const merges=[];

  /* colours */
  const NAVY="1F3864",GOLD="C9A227",WHITE="FFFFFF",LBG="EBF0FA",
        HBLU="2E5BDC",RALT="F4F7FD",TOTBG="D9E2F3",
        DRK="1A2744",RED="C0392B",GRN="1A7A4A",BDC="C0C8D8";

  /* style helpers */
  const FL=h=>({patternType:"solid",fgColor:{rgb:h}});
  const FN=(bold=false,sz=10,col=DRK)=>({bold,sz,color:{rgb:col},name:"Arial"});
  const AL=(h="left",v="center",w=false)=>({horizontal:h,vertical:v,wrapText:w});
  const BD=(s="thin")=>{ const b={style:s,color:{rgb:BDC}}; return{top:b,bottom:b,left:b,right:b}; };
  const BDM=()=>{ const t={style:"medium",color:{rgb:BDC}},n={style:"thin",color:{rgb:BDC}}; return{top:t,bottom:t,left:n,right:n}; };

  function cell(r,c,v,st){
    const addr=XLS.utils.encode_cell({r:r-1,c:c-1});
    const t=typeof v==="number"?"n":"s";
    ws[addr]={v:(v===null||v===undefined)?"":v, t, s:st};
  }
  function mg(r1,c1,r2,c2){ merges.push({s:{r:r1-1,c:c1-1},e:{r:r2-1,c:c2-1}}); }

  /* pre-calculate */
  const totDr=entries.reduce((s,e)=>s+e.dr,0);
  const totCr=entries.reduce((s,e)=>s+e.cr,0);
  const closing=totDr-totCr;
  const dates=entries.map(e=>e.date).filter(Boolean);
  const dateRange=dates.length?`${fmtDate(dates[0])} to ${fmtDate(dates[dates.length-1])}`:"—";
  const clText=`${Math.abs(closing).toFixed(2)} ${closing>=0?"Dr":"Cr"}`;
  const clCol=closing>0?RED:(closing<0?GRN:DRK);

  /* ROW 1 — Company banner */
  mg(1,1,1,7);
  cell(1,1,s.name,{font:FN(true,14,WHITE),fill:FL(NAVY),alignment:AL("center","center")});

  /* ROW 2 — Address/contact */
  mg(2,1,2,7);
  const addrLine=`${s.address||""}${s.city?", "+s.city:""}   ·   Mobile: ${s.phone||"—"}   ·   Email: ${s.email||"—"}   ·   GSTIN: ${s.gstin||"—"}`;
  cell(2,1,addrLine,{font:FN(false,9,WHITE),fill:FL("2B4590"),alignment:AL("center","center",true)});

  /* ROW 3 — Gold accent stripe */
  mg(3,1,3,7);
  cell(3,1,"",{fill:FL(GOLD)});

  /* INFO helper */
  const IF=(bold=false,align="left")=>({font:FN(bold,9),fill:FL(LBG),alignment:AL(align,"center"),border:BD()});

  /* ROW 4 — Party name / Date */
  cell(4,1,"Party Name",IF(true));
  mg(4,2,4,5); cell(4,2,party.name,IF(false));
  cell(4,6,"Date",IF(true,"right"));
  cell(4,7,dateRange,IF(false));

  /* ROW 5 — Address / Opening Bal */
  cell(5,1,"Address",IF(true));
  mg(5,2,5,5); cell(5,2,party.address||"—",IF(false));
  cell(5,6,"Opening Bal",IF(true,"right"));
  cell(5,7,"0.00 Dr",IF(false));

  /* ROW 6 — Closing Bal */
  cell(6,1,"",IF(false)); mg(6,2,6,5); cell(6,2,"",IF(false));
  cell(6,6,"Closing Bal",IF(true,"right"));
  cell(6,7,clText,{font:FN(true,9,clCol),fill:FL(LBG),alignment:AL("left","center"),border:BD()});

  /* ROW 7 — GSTIN */
  cell(7,1,"GSTIN",IF(true));
  mg(7,2,7,5); cell(7,2,party.gstin||"—",IF(false));
  cell(7,6,"",IF(false)); cell(7,7,"",IF(false));

  /* ROW 8 — spacer */
  for(let c=1;c<=7;c++) cell(8,c,"",{fill:FL(WHITE)});

  /* ROW 9 — Column headers */
  ["Type","Date","Voucher No","Particulars","Debit (₹)","Credit (₹)","Balance"].forEach((h,i)=>{
    const col=i+1;
    cell(9,col,h,{font:FN(true,10,WHITE),fill:FL(HBLU),
      alignment:AL(col>=5?"center":"left","center"),
      border:{top:{style:"medium",color:{rgb:BDC}},bottom:{style:"medium",color:{rgb:BDC}},
              left:{style:"thin",color:{rgb:BDC}},right:{style:"thin",color:{rgb:BDC}}}});
  });

  /* DATA rows (start row 10) */
  let bal=0;
  entries.forEach((e,ri)=>{
    const row=10+ri;
    bal+=(e.dr||0)-(e.cr||0);
    const rf=ri%2===0?FL(RALT):{patternType:"none"};
    const bc=bal>0?RED:(bal<0?GRN:DRK);
    const bTxt=`${Math.abs(bal).toFixed(2)} ${bal>=0?"Dr":"Cr"}`;
    const vals=[e.type||"",fmtDate(e.date||""),e.vno||"",e.particulars||"",
                (e.dr||0)>0?e.dr:null,(e.cr||0)>0?e.cr:null,bTxt];
    vals.forEach((v,ci)=>{
      const col=ci+1; const isNum=col>=5&&col<=6&&v!==null;
      const addr=XLS.utils.encode_cell({r:row-1,c:col-1});
      ws[addr]={v:v===null?"":v, t:isNum?"n":"s",
        s:{font:col===7?FN(true,10,bc):FN(),fill:rf,
           alignment:AL(col>=5?"right":"left","center"),border:BD()},
        z:isNum?"#,##0.00":"General"};
    });
  });

  /* TOTALS row */
  const tr=10+entries.length;
  [["Total","l"],["","l"],["","l"],["","l"],
   [totDr,"r"],[totCr,"r"],[clText,"r"]].forEach(([v,ha],ci)=>{
    const col=ci+1; const isNum=col>=5&&col<=6;
    const addr=XLS.utils.encode_cell({r:tr-1,c:col-1});
    ws[addr]={v,t:isNum?"n":"s",
      s:{font:FN(true,10,col===7?clCol:DRK),fill:FL(TOTBG),
         alignment:AL(ha==="r"?"right":"left","center"),border:BDM()},
      z:isNum?"#,##0.00":"General"};
  });

  ws["!ref"]=XLS.utils.encode_range({r:0,c:0},{r:tr-1,c:6});
  ws["!merges"]=merges;
  ws["!cols"]=[14,13,18,32,14,14,17].map(w=>({wch:w}));
  ws["!rows"]=[{hpt:24},{hpt:40},{hpt:4},{hpt:18},{hpt:18},{hpt:18},{hpt:18},{hpt:5},{hpt:18}];

  XLS.utils.book_append_sheet(wb,ws,(party.name||"Party").slice(0,31));
}

function applyColorTheme(name){
  const t=THEMES[name]||THEMES.teal;
  const L=t.light, D=t.dark;
  const isDark=document.body.classList.contains("dark");
  const css=`:root{
    --brand:${L.brand};--brand-d:${L.brandD};--accent:${L.accent};
    --ink:${L.ink};--ink-2:${L.ink2};
    --paper:${L.paper};--card:${L.card};
    --line:${L.line};--line-2:${L.line2};
    --text:${L.text};--muted:${L.muted};
    --shadow:0 1px 3px ${L.shadow},0 6px 24px ${L.shadow};
    --glowA:${hexA(L.brand,.20)};--glowB:${hexA(L.brand,.45)};
  }
  .side{background:${L.sideBg};color:${L.sideText}}
  .nav button{color:${L.sideNav}}
  .side .foot{color:${L.sideMuted}}
  .brand b{color:#fff}
  .brand span{color:${L.sideMuted}}
  .brand .logo{background:linear-gradient(140deg,${L.brand},${L.brand2})}
  .nav button.on{background:${L.brand};color:#fff;box-shadow:0 4px 12px ${hexA(L.brand,.4)}}
  body.dark{
    --brand:${D.brand};--brand-d:${D.brandD};--accent:${D.accent};--ink:${D.ink};
    --paper:${D.paper||'#0d1220'};--card:${D.card||'#131a2e'};--line:${D.line||'#1e2a40'};
  }
  body.dark .side{background:${D.sideBg}}`;
  let el=document.getElementById("themeColors");
  if(!el){ el=document.createElement("style"); el.id="themeColors"; document.head.appendChild(el); }
  el.textContent=css;
  db.settings.theme=name;
}
function hexA(hex,a){ const h=hex.replace("#",""); const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16); return `rgba(${r},${g},${b},${a})`; }
function setTheme(name){ applyColorTheme(name); saveDB(); if(current==="dashboard"){renderDashboard();} if(current==="settings")renderSettings(); toast("Theme applied: "+(THEMES[name]?THEMES[name].label:name)); }

function inRep(d){ if(!d)return false; d=String(d).slice(0,10); return (!_rep.from||d>=_rep.from)&&(!_rep.to||d<=_rep.to); }

  {k:"purchase",ic:"🛒",t:"Purchase Register",d:"All expense bills"},
  {k:"outstanding",ic:"📌",t:"Party Outstanding",d:"Receivables & payables"},
  {k:"ledger",ic:"📒",t:"Ledger Report",d:"Statement for one party"},
  {k:"receipts",ic:"📥",t:"Receipt Register",d:"Money received"},
  {k:"payments",ic:"📤",t:"Payment Register",d:"Money paid"},
  {k:"creditreg",ic:"↩",t:"Credit Note Register",d:"All credit notes"},
  {k:"debitreg",ic:"↪",t:"Debit Note Register",d:"All debit notes"},
  {k:"gst",ic:"📊",t:"GST Summary",d:"Output vs input tax"},
  {k:"tds",ic:"🧾",t:"TDS Summary",d:"By section"},
  {k:"cashbook",ic:"💵",t:"Cash Book",d:"Cash in/out, running balance"},
  {k:"bankbook",ic:"🏦",t:"Bank Book",d:"Bank in/out, running balance"},

function repApplyDates(){ _rep.from=val("rep_from"); _rep.to=val("rep_to"); selectReport(_rep.cur); refreshRepHeader(); }
function refreshRepHeader(){ /* light refresh of the showing label */ renderReportsHub(); }
function repQuick(kind){
  const d=new Date(); const y=d.getFullYear(),m=d.getMonth();
  if(kind==="fy"){ _rep.from=fyStart(); _rep.to=today(); }
  else if(kind==="m"){ _rep.from=`${y}-${String(m+1).padStart(2,"0")}-01`; _rep.to=today(); }
  else if(kind==="q"){ const qs=[0,3,6,9].filter(s=>s<=m).pop(); _rep.from=`${y}-${String(qs+1).padStart(2,"0")}-01`; _rep.to=today(); }
  else { _rep.from=""; _rep.to=""; }
  renderReportsHub();
}
function selectReport(k){
  _rep.cur=k;
  document.querySelectorAll(".rep-item").forEach((el,i)=>el.classList.toggle("on",REPORTS[i] && REPORTS[i].k===k));
  if(k==="ledger"){ renderLedgerReport(); return; }
  if(k==="bankbook"){ renderBankBook(); return; }
  const R=buildReport(k);
  renderRepTable(R);
}
function renderRepTable(R){
  const out=document.getElementById("repOut"); if(!out) return;
  const head=R.headers.map(h=>`<th class="${typeof h==='object'?h.cls||'':''}">${typeof h==='object'?h.t:h}</th>`).join("");
  const body=R.rows.length?R.rows.map(r=>`<tr>${r.map((c,i)=>`<td class="${R.align&&R.align[i]==='r'?'t-r num':(R.align&&R.align[i]==='c'?'t-c':'')}">${c}</td>`).join("")}</tr>`).join(""):`<tr><td colspan="${R.headers.length}" class="empty">No data for this period</td></tr>`;
  const foot=R.foot?`<tfoot><tr>${R.foot.map((c,i)=>`<td class="${R.align&&R.align[i]==='r'?'t-r num':''}" style="font-weight:800;border-top:2px solid var(--line)">${c}</td>`).join("")}</tr></tfoot>`:"";
  out.innerHTML=`
    <div class="card pad">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px">
        <div><div style="font-weight:800;font-size:16px;color:var(--ink)">${R.title}</div>
        ${R.note?`<div style="font-size:12px;color:var(--muted)">${R.note}</div>`:""}</div>
        <div style="display:flex;gap:8px">
          <button class="btn sm" onclick="repPrint()">🖨 Print</button>
          <button class="btn sm" onclick="repPDF()">📄 PDF</button>
          <button class="btn sm primary" onclick="repCSV()">⭳ Excel</button>
        </div>
      </div>
      <div style="overflow:auto"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody>${foot}</table></div>
    </div>`;
  _repCache=R;
}
let _repCache=null;
function repColsText(R){ return {head:R.headers.map(h=>typeof h==='object'?h.t:h), rows:R.rows.map(r=>r.map(c=>String(c).replace(/<[^>]+>/g,""))), foot:R.foot?R.foot.map(c=>String(c).replace(/<[^>]+>/g,"")):null}; }
function repCSV(){ if(!_repCache)return; const T=repColsText(_repCache); let csv=T.head.map(csvq).join(",")+"\n"; T.rows.forEach(r=>csv+=r.map(csvq).join(",")+"\n"); if(T.foot)csv+=T.foot.map(csvq).join(",")+"\n"; downloadFile(_repCache.title.replace(/\s+/g,"_")+"_"+today()+".csv","text/csv;charset=utf-8","\uFEFF"+csv); toast("Exported to CSV (opens in Excel)"); }
function repPrint(){ if(!_repCache)return; const T=repColsText(_repCache);
  const html=`<div class="inv" style="padding:20px"><h2 style="margin:0 0 2px">${esc(db.seller.name||"")}</h2>
    <div style="color:#666;font-size:12px;margin-bottom:10px">${_repCache.title} · ${fmtDate(_rep.from)||'—'} to ${fmtDate(_rep.to)||'—'}</div>
    <table class="it" style="width:100%;border-collapse:collapse"><thead><tr>${T.head.map(h=>`<th style="text-align:left;border-bottom:1px solid #ccc;padding:6px">${esc(h)}</th>`).join("")}</tr></thead>
    <tbody>${T.rows.map(r=>`<tr>${r.map(c=>`<td style="padding:5px 6px;border-bottom:1px solid #eee">${esc(c)}</td>`).join("")}</tr>`).join("")}</tbody>
    ${T.foot?`<tfoot><tr>${T.foot.map(c=>`<td style="padding:6px;font-weight:700;border-top:2px solid #999">${esc(c)}</td>`).join("")}</tr></tfoot>`:""}</table></div>`;
  document.getElementById("print-root").innerHTML=html; window.print();

async function repPDF(){
  if(!_repCache)return;
  if(!window.jspdf){ toast("PDF engine not loaded"); return; }
  const T=repColsText(_repCache);
  const {jsPDF}=window.jspdf; const doc=new jsPDF({orientation:T.head.length>6?"landscape":"portrait"});
  doc.setFontSize(14); doc.text(db.seller.name||"Finto Pro",14,16);
  doc.setFontSize(10); doc.setTextColor(120); doc.text(`${_repCache.title} · ${fmtDate(_rep.from)||'—'} to ${fmtDate(_rep.to)||'—'}`,14,22);
  doc.autoTable({head:[T.head],body:T.rows,foot:T.foot?[T.foot]:undefined,startY:27,styles:{fontSize:8},
    headStyles:{fillColor:[14,124,112]},footStyles:{fillColor:[235,235,235],textColor:20,fontStyle:"bold"}});
  doc.save(_repCache.title.replace(/\s+/g,"_")+"_"+today()+".pdf"); toast("PDF downloaded");
}

/* ---------- Bank Book (per-account, ledger style) ---------- */
function _bankVouchers(bid){
  return (db.vouchers||[]).filter(v=>{
    if(v.bankAccountId) return v.bankAccountId===bid;
    /* legacy bank vouchers with no account id belong to the original HDFC account */
    return bid==="bank_default" && v.mode==="bank";
  });
}
function renderBankBook(){
  const out=document.getElementById("repOut"); if(!out)return;
  const banks=(db.bankAccounts||[]);
  if(!banks.length){
    out.innerHTML=`<div class="card pad">${emptyBox("🏦","No bank accounts","Add your bank accounts in Firm Profile → Bank Accounts to view the Bank Book.")}</div>`;
    return;
  }
  if(!_rep.bid || !banks.some(b=>b.id===_rep.bid)) _rep.bid=banks[0].id;
  const ba=banks.find(b=>b.id===_rep.bid);

  const all=_bankVouchers(_rep.bid).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  const from=_rep.from||"";
  /* opening = account opening balance + movements strictly before the period */
  let opening=ba.openingBalance||0;
  all.forEach(v=>{ if(from && (v.date||"")<from) opening+=(v.dir==="in"?1:-1)*(v.amount||0); });

  const inPeriod=all.filter(v=>inRep(v.date));
  let bal=opening, received=0, paid=0;
  const plainRows=[];
  const rows=inPeriod.map(v=>{
    const isIn=v.dir==="in"; const amt=v.amount||0;
    if(isIn){received+=amt; bal+=amt;} else {paid+=amt; bal-=amt;}
    const balTxt=inr(Math.abs(bal))+(bal<0?" Cr":"");
    plainRows.push([fmtDate(v.date),
      (v.partyId?partyName(v.partyId)+" · ":"")+(v.narration||"—"),
      isIn?inr(amt):"—", !isIn?inr(amt):"—", balTxt]);
    return [fmtDate(v.date),
      esc((v.partyId?partyName(v.partyId)+" · ":"")+(v.narration||"—")),
      isIn?inr(amt):"—",
      !isIn?inr(amt):"—",
      `<span style="color:${bal>=0?'var(--brand)':'var(--red)'};font-weight:700">${balTxt}</span>`];
  });
  const closing=bal;

  /* cache plain-text version for Print / PDF / Excel */
  _repCache={
    title:"Bank Book — "+(ba.name||"")+(ba.accountNo?" ("+ba.accountNo+")":""),
    headers:["Date","Particulars","Received (In)","Paid (Out)","Balance"],
    rows:[["","Opening Balance","","",inr(Math.abs(opening))+(opening<0?" Cr":"")],
          ...plainRows],
    align:["","","r","r","r"],
    foot:["","Closing Balance",inr(received),inr(paid),inr(Math.abs(closing))+(closing<0?" Cr":"")],
    note:"Opening, money received, money paid and closing balance for the selected bank account."
  };

  const opts=banks.map(b=>`<option value="${b.id}" ${_rep.bid===b.id?"selected":""}>🏦 ${esc(b.name)}${b.accountNo?" · "+b.accountNo:""}</option>`).join("");
  const body=rows.length?rows.map(r=>`<tr>${r.map((c,i)=>`<td class="${_repCache.align[i]==='r'?'t-r num':''}">${c}</td>`).join("")}</tr>`).join("")
    :`<tr><td colspan="5" class="empty">No transactions for this account in the selected period</td></tr>`;

  out.innerHTML=`<div class="card pad">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:10px"><b style="color:var(--ink)">Bank account</b>
        <select class="bb-select" onchange="_rep.bid=this.value;renderBankBook()">${opts}</select></div>
      <div style="display:flex;gap:8px">
        <button class="btn sm" onclick="repPrint()">🖨 Print</button>
        <button class="btn sm" onclick="repPDF()">📄 PDF</button>
        <button class="btn sm primary" onclick="repCSV()">⭳ Excel</button>
      </div>
    </div>

    <div class="bb-stats">
      <div class="bb-stat"><div class="lab">Opening Balance</div><div class="v">${inr(Math.abs(opening))}${opening<0?' <span style="font-size:12px">Cr</span>':''}</div></div>
      <div class="bb-stat in"><div class="lab">Amount Received ↓</div><div class="v">${inr(received)}</div></div>
      <div class="bb-stat out"><div class="lab">Amount Paid ↑</div><div class="v">${inr(paid)}</div></div>
      <div class="bb-stat close"><div class="lab">Closing Balance</div><div class="v">${inr(Math.abs(closing))}${closing<0?' <span style="font-size:12px">Cr</span>':''}</div></div>
    </div>

    <div style="overflow:auto"><table>
      <thead><tr><th>Date</th><th>Particulars</th><th class="t-r">Received (In)</th><th class="t-r">Paid (Out)</th><th class="t-r">Balance</th></tr></thead>
      <tbody>
        <tr style="background:var(--amber-bg)"><td colspan="4" style="font-weight:700;color:var(--accent)">Opening Balance</td>
          <td class="t-r num" style="font-weight:800;color:${opening>=0?'var(--brand)':'var(--red)'}">${inr(Math.abs(opening))}${opening<0?' Cr':''}</td></tr>
        ${body}
      </tbody>
      <tfoot><tr>
        <td colspan="2" style="font-weight:800;border-top:2px solid var(--line)">Closing Balance</td>
        <td class="t-r num" style="font-weight:800;border-top:2px solid var(--line);color:var(--green)">${inr(received)}</td>
        <td class="t-r num" style="font-weight:800;border-top:2px solid var(--line);color:var(--red)">${inr(paid)}</td>
        <td class="t-r num" style="font-weight:800;border-top:2px solid var(--line);color:${closing>=0?'var(--brand)':'var(--red)'}">${inr(Math.abs(closing))}${closing<0?' Cr':''}</td>
      </tr></tfoot>
    </table></div>
  </div>`;
}

function buildReport(k){
  if(k==="sales"){
    const invs=db.invoices.filter(i=>inRep(i.date)).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    let tx=0,c=0,s=0,ig=0,net=0;
    const rows=invs.map(i=>{ const t=i.totals; tx+=t.taxable;c+=t.cgst;s+=t.sgst;ig+=t.igst;net+=t.net;
      return [fmtDate(i.date),esc(i.number),esc(i.buyer.name||""),inr(t.taxable),inr(t.cgst),inr(t.sgst),inr(t.igst),inr(t.net)]; });
    return {title:"Sales Register",headers:["Date","Invoice No","Client","Taxable","CGST","SGST","IGST","Total"],rows,align:["","","","r","r","r","r","r"],
      foot:["","","Total",inr(tx),inr(c),inr(s),inr(ig),inr(net)]};
  }
  if(k==="purchase"){
    const purs=(db.purchaseInvoices||[]).filter(p=>inRep(p.date)).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    let tx=0,g=0,net=0; const rows=purs.map(p=>{ const t=p.totals||{}; const tax=(t.cgst||0)+(t.sgst||0)+(t.igst||0); tx+=t.taxable||0;g+=tax;net+=t.net||0;
      return [fmtDate(p.date),esc(p.billNo||""),esc(p.supplierName||""),inr(t.taxable||0),inr(tax),inr(t.net||0)]; });
    return {title:"Purchase Register",headers:["Date","Bill No","Vendor","Taxable","GST","Total"],rows,align:["","","","r","r","r"],
      foot:["","","Total",inr(tx),inr(g),inr(net)]};
  }
  if(k==="outstanding"){
    let dr=0,cr=0; const rows=[];
    db.parties.forEach(p=>{ const b=partyBalance(p.id); if(Math.abs(b)<0.5)return; if(b>0)dr+=b;else cr+=-b;
      rows.push([esc(p.name),b>=0?"Receivable":"Payable",inr(Math.abs(b))]); });
    rows.sort((a,b)=>a[1].localeCompare(b[1]));
    return {title:"Party Outstanding",headers:["Party","Type","Amount"],rows,align:["","","r"],
      foot:["Net",dr-cr>=0?"Receivable":"Payable",inr(Math.abs(dr-cr))]};
  }
  if(k==="receipts"||k==="payments"){
    const dir=k==="receipts"?"in":"out";
    const vs=db.vouchers.filter(v=>v.type==="receipt"&&v.dir===dir&&inRep(v.date)).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    let amt=0,tds=0; const rows=vs.map(v=>{ amt+=v.amount||0; tds+=v.tds||0;
      return [fmtDate(v.date),esc(v.partyId?partyName(v.partyId):"—"),(v.mode||"").toUpperCase(),esc(v.narration||""),inr(v.amount||0),v.tds?inr(v.tds):"—"]; });
    return {title:k==="receipts"?"Receipt Register":"Payment Register",headers:["Date","Party","Mode","Narration","Amount","TDS"],rows,align:["","","","","r","r"],
      foot:["","","","Total",inr(amt),inr(tds)]};
  }
  if(k==="creditreg"||k==="debitreg"){
    const nt=k==="creditreg"?"credit":"debit";
    const ns=(db.credNotes||[]).filter(n=>n.noteType===nt&&inRep(n.date)).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    let net=0; const rows=ns.map(n=>{ net+=n.totals?.net||0;
      return [fmtDate(n.date),esc(n.number||""),esc(n.buyer?.name||""),esc(n.againstInvoice||"—"),inr(n.totals?.net||0)]; });
    return {title:nt==="credit"?"Credit Note Register":"Debit Note Register",headers:["Date","Note No","Client","Against Invoice","Amount"],rows,align:["","","","","r"],
      foot:["","","","Total",inr(net)]};
  }
  if(k==="gst"){
    let oT=0,oC=0,oS=0,oI=0; db.invoices.filter(i=>inRep(i.date)&&i.gstEnabled!==false).forEach(i=>{oT+=i.totals.taxable;oC+=i.totals.cgst;oS+=i.totals.sgst;oI+=i.totals.igst;});
    let iT=0,iTax=0; (db.purchaseInvoices||[]).filter(p=>inRep(p.date)).forEach(p=>{const t=p.totals||{};iT+=t.taxable||0;iTax+=(t.cgst||0)+(t.sgst||0)+(t.igst||0);});
    const outGst=oC+oS+oI; const net=outGst-iTax;
    const rows=[
      ["Output GST (on sales)",inr(oT),inr(outGst)],
      ["  CGST","",inr(oC)],["  SGST","",inr(oS)],["  IGST","",inr(oI)],
      ["Input GST (on purchases)",inr(iT),inr(iTax)],
    ];
    return {title:"GST Summary",headers:["Particulars","Taxable","Tax"],rows,align:["","r","r"],
      foot:["Net GST Payable","",inr(net)],note:"Output tax minus input tax credit"};
  }
  if(k==="tds"){
    const secs={}; db.vouchers.forEach(v=>{ if(!v.tds||!inRep(v.date))return; const s=v.tdsSection||"Unspecified"; secs[s]=secs[s]||{r:0,d:0}; if(v.dir==="in")secs[s].r+=v.tds; else secs[s].d+=v.tds; });
    let tr=0,td=0; const rows=Object.entries(secs).map(([s,o])=>{ tr+=o.r;td+=o.d; return [s,inr(o.r),inr(o.d)]; });
    return {title:"TDS Summary",headers:["Section","TDS Receivable (by clients)","TDS Deducted (by you)"],rows,align:["","r","r"],
      foot:["Total",inr(tr),inr(td)],note:"Receivable reflects in your Form 26AS; Deducted is payable to the government"};
  }
  if(k==="cashbook"||k==="bankbook"){
    const isCash=k==="cashbook";
    const vs=db.vouchers.filter(v=>v.type==="receipt"&&(isCash?v.mode==="cash":(v.mode==="bank"||v.bankAccountId))&&inRep(v.date)).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    let bal=0,tin=0,tout=0; const rows=vs.map(v=>{ const inn=v.dir==="in"?v.amount:0,out=v.dir==="out"?v.amount:0; bal+=inn-out; tin+=inn;tout+=out;
      return [fmtDate(v.date),esc((v.partyId?partyName(v.partyId)+" · ":"")+(v.narration||"")),inn?inr(inn):"—",out?inr(out):"—",inr(Math.abs(bal))+(bal>=0?"":" Cr")]; });
    return {title:isCash?"Cash Book":"Bank Book",headers:["Date","Particulars","Receipt (In)","Payment (Out)","Balance"],rows,align:["","","r","r","r"],
      foot:["","Total",inr(tin),inr(tout),inr(Math.abs(bal))]};
  }
  if(k==="pl"){
    let income=0; db.invoices.filter(i=>inRep(i.date)).forEach(i=>income+=i.totals.taxable);
    (db.parchas||[]).filter(p=>inRep(p.date)).forEach(p=>income+=p.totals?.taxable||p.totals?.net||0);
    let exp=0; (db.purchaseInvoices||[]).filter(p=>inRep(p.date)).forEach(p=>exp+=p.totals?.taxable||0);
    const profit=income-exp;
    const rows=[
      ["Income — Professional fees & services",inr(income)],
      ["Less: Expenses & purchases",inr(exp)],
    ];
    return {title:"Profit & Loss Statement",headers:["Particulars","Amount"],rows,align:["","r"],
      foot:[profit>=0?"Net Profit":"Net Loss",inr(Math.abs(profit))],note:"Simplified summary (excl. GST). For detailed statements see Accounts & P&L."};
  }
  if(k==="bs"){
    const kp=computeKPIs();
    const assets=kp.cash+kp.bank+kp.recv+kp.tdsRecv;
    const liab=kp.payables;
    const capital=assets-liab;
    const rows=[
      ["ASSETS","",""],
      ["  Cash in hand","",inr(kp.cash)],
      ["  Bank balances","",inr(kp.bank)],
      ["  Receivables (debtors)","",inr(kp.recv)],
      ["  TDS receivable (26AS)","",inr(kp.tdsRecv)],
      ["LIABILITIES","",""],
      ["  Payables (creditors)","",inr(kp.payables)],
      ["  Capital / Reserves (bal. fig.)","",inr(capital)],
    ];
    return {title:"Balance Sheet",headers:["Particulars","","Amount"],rows,align:["","","r"],
      foot:["Total Assets","",inr(assets)],note:"Simplified summary. For detailed statements see Accounts & P&L."};
  }
  if(k==="trial"){
    const rows=[]; let dr=0,cr=0;
    const kp=computeKPIs();
    const add=(name,bal)=>{ if(Math.abs(bal)<0.5)return; if(bal>=0){dr+=bal;rows.push([esc(name),inr(bal),"—"]);}else{cr+=-bal;rows.push([esc(name),"—",inr(-bal)]);} };
    add("Cash in hand",kp.cash); add("Bank",kp.bank);
    db.parties.forEach(p=>{ add(p.name,partyBalance(p.id)); });
    // balancing
    const diff=dr-cr; if(Math.abs(diff)>=0.5){ if(diff>0){cr+=diff;rows.push(["Capital / Income (bal. fig.)","—",inr(diff)]);}else{dr+=-diff;rows.push(["Drawings / Expense (bal. fig.)",inr(-diff),"—"]);} }
    return {title:"Trial Balance",headers:["Ledger","Debit","Credit"],rows,align:["","r","r"],
      foot:["Total",inr(dr),inr(cr)],note:"Cash, bank & party balances with a balancing figure. For a full TB see Accounts & P&L."};
  }
  if(k==="ageing"){
    const tdy=new Date(today());
    const buckets={}; const rows=[]; let tC=0,t30=0,t60=0,t90=0,t90p=0;
    db.invoices.forEach(i=>{ const bal=Math.max(0,(i.totals.net-(i.paid||0))); if(bal<0.5)return;
      const ref=new Date(i.due||i.date); const days=Math.floor((tdy-ref)/86400000);
      const nm=i.buyer.name||"—"; buckets[nm]=buckets[nm]||{c:0,d30:0,d60:0,d90:0,d90p:0};
      if(days<=0)buckets[nm].c+=bal; else if(days<=30)buckets[nm].d30+=bal; else if(days<=60)buckets[nm].d60+=bal; else if(days<=90)buckets[nm].d90+=bal; else buckets[nm].d90p+=bal;
    });
    Object.entries(buckets).forEach(([nm,b])=>{ const tot=b.c+b.d30+b.d60+b.d90+b.d90p; tC+=b.c;t30+=b.d30;t60+=b.d60;t90+=b.d90;t90p+=b.d90p;
      rows.push([esc(nm),inr(b.c),inr(b.d30),inr(b.d60),inr(b.d90),inr(b.d90p),inr(tot)]); });
    return {title:"Ageing Report (Receivables)",headers:["Client","Current","1–30 d","31–60 d","61–90 d","90+ d","Total"],rows,align:["","r","r","r","r","r","r"],
      foot:["Total",inr(tC),inr(t30),inr(t60),inr(t90),inr(t90p),inr(tC+t30+t60+t90+t90p)],note:"Aged from invoice due date. Not date-filtered."};
  }
  return {title:"Report",headers:["—"],rows:[]};
}

          <div class="grid" style="grid-template-columns:1fr 1fr">
            <div class="field"><label>Section</label><input id="f26_sec" placeholder="e.g. 194J"></div>
            <div class="field"><label>TDS amount (₹)</label><input id="f26_amt" type="number" min="0"></div>

          ${list.length?`<div style="overflow:auto"><table><thead><tr><th>Deductor</th><th>TAN</th><th>Sec</th><th class="t-r">Amount</th><th></th></tr></thead>
            <tbody>${list.map(e=>`<tr><td>${esc(e.party||"")}</td><td>${esc(e.tan||"")}</td><td>${esc(e.section||"")}</td>
            <td class="t-r num">${inr(+e.amount||0)}</td><td><button class="delrow" onclick="del26as('${e.id}')">×</button></td></tr>`).join("")}</tbody></table></div>`

        <div class="sectit" style="margin-bottom:10px">Party-wise reconciliation (Books vs 26AS)</div>
        ${names.length?`<div style="overflow:auto"><table><thead><tr><th>Party</th><th class="t-r">Books</th><th class="t-r">26AS</th><th class="t-r">Status</th></tr></thead><tbody>${cmpRows}</tbody></table></div>`

      </div>`;
  }
}
function save26as(){
  const party=val("f26_party"); const amt=+val("f26_amt")||0;
  if(!party){toast("Enter deductor name");return;} if(!amt){toast("Enter TDS amount");return;}
  if(!db.form26as)db.form26as=[];
  db.form26as.push({id:id(),party,tan:val("f26_tan"),section:val("f26_sec"),amount:amt,fy:val("f26_fy")});
  saveDB(); tdsRender(); toast("26AS entry added");
}
function del26as(eid){ db.form26as=(db.form26as||[]).filter(e=>e.id!==eid); saveDB(); tdsRender(); toast("Entry removed"); }

/* =========================================================================
   APP LOCK (PIN)
   ========================================================================= */
const PIN_KEY="ll_pin";
(function initLock(){
  document.addEventListener("keydown",e=>{
    if(e.shiftKey&&e.key==="F9"){localStorage.removeItem(PIN_KEY);toast("PIN cleared — refresh to set new one");}
  });
  const pin=localStorage.getItem(PIN_KEY);
  if(pin){document.getElementById("lockScreen").classList.add("show");}
})();
function tryUnlock(val){
  if(val.length<4)return;
  const pin=localStorage.getItem(PIN_KEY);
  if(val===pin){
    document.getElementById("lockScreen").classList.remove("show");
    document.getElementById("lockPinInput").value="";
    document.getElementById("lockErr").textContent="";
  } else if(val.length>=4){
    document.getElementById("lockErr").textContent="Wrong PIN";
    document.getElementById("lockPinInput").value="";
  }
}
function setupPIN(){
  const p=prompt("Set a 4-6 digit app lock PIN (leave blank to disable):");
  if(p===null)return;
  if(!p){localStorage.removeItem(PIN_KEY);toast("App lock removed");return;}
  if(!/^\d{4,6}$/.test(p)){toast("PIN must be 4-6 digits");return;}
  const c=prompt("Confirm PIN:");
  if(c!==p){toast("PINs do not match");return;}
  localStorage.setItem(PIN_KEY,p);toast("App lock PIN set ✓");
}

  (db.purchaseInvoices||[]).forEach(v=>{purCost+=v.totals?.taxable||0;purTax+=(v.totals?.cgst||0)+(v.totals?.sgst||0)+(v.totals?.igst||0);});
  let adjustTotal=0;
  db.vouchers.filter(v=>v.type==="manual").forEach(v=>{adjustTotal+=(v.dr||0)-(v.cr||0);});

  const netProfit=grossProfit;
  let cashBal=0,bankBal=0;
  db.vouchers.forEach(v=>{
    if(v.mode==="cash")cashBal+=(v.dir==="in"?1:-1)*(v.amount||0);
    if(v.mode==="bank"||(v.bankAccountId))bankBal+=(v.dir==="in"?1:-1)*(v.amount||0);

  let totalRecv=0;db.parties.forEach(p=>{const b=partyBalance(p.id);if(b>0)totalRecv+=b;});
  let totalPayable=0;db.parties.forEach(p=>{const b=partyBalance(p.id);if(b<0)totalPayable+=Math.abs(b);});
  const totalAssets=cashBal+bankBal+stockVal+totalRecv;
  const outputGST=saleTax;
  const inputGST=purTax;
  const netGST=outputGST-inputGST;

  if(t==="pl"){

        <div style="font-size:12px;color:var(--muted);margin-top:3px">Cumulative · All data on this device</div></div>
        <span class="tag ${netProfit>=0?'green':'red'}" style="font-size:14px;padding:6px 14px">${netProfit>=0?'Profit':'Loss'}</span>

        <div class="fin-hd">Income</div>
        <div class="fin-row"><span>Sales Revenue (Taxable)</span><span class="num">${inr(salesRev)}</span></div>

        <div class="fin-row total"><span>Total Income</span><span class="num">${inr(salesRev)}</span></div>
      </div>
      <div class="fin-section">
        <div class="fin-hd">Cost of Goods Sold</div>
        <div class="fin-row"><span>Purchase Cost (Taxable)</span><span class="num">${inr(purCost)}</span></div>
        <div class="fin-row sub"><span>Input GST paid</span><span class="num">${inr(purTax)}</span></div>
        <div class="fin-row total"><span>Gross Profit</span><span class="num" style="color:${grossProfit>=0?'var(--green)':'var(--red)'}">${inr(grossProfit)}</span></div>
      </div>
      <div class="fin-section">
        <div class="fin-hd">GST Position</div>
        <div class="fin-row"><span>Output GST (liability)</span><span class="num" style="color:var(--red)">${inr(outputGST)}</span></div>
        <div class="fin-row"><span>Input GST Credit (asset)</span><span class="num" style="color:var(--green)">${inr(inputGST)}</span></div>
        <div class="fin-row total"><span>Net GST Payable</span><span class="num" style="color:${netGST>=0?'var(--red)':'var(--green)'}">${inr(Math.abs(netGST))} ${netGST>=0?'Payable':'Refund'}</span></div>
      </div>
      <div style="margin-top:16px;padding:16px;background:${netProfit>=0?'var(--green-bg)':'var(--red-bg)'};border-radius:10px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:15px;font-weight:700">Net Profit / (Loss)</span>
        <span class="num" style="font-size:22px;font-weight:800;color:${netProfit>=0?'var(--green)':'var(--red)'}">${inr(netProfit)}</span>
      </div>
    </div>`;
  }

  if(t==="bs"){
    c.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card pad">
        <h3 style="font-size:15px;margin:0 0 14px">Assets</h3>

          <div class="fin-row"><span>Bank Balance</span><span class="num">${inr(bankBal)}</span></div>
          <div class="fin-row"><span>Stock / Inventory</span><span class="num">${inr(stockVal)}</span></div>
          <div class="fin-row"><span>Accounts Receivable</span><span class="num">${inr(totalRecv)}</span></div>
          <div class="fin-row"><span>GST Input Credit</span><span class="num">${inr(inputGST)}</span></div>
          <div class="fin-row total"><span>Total Assets</span><span class="num">${inr(totalAssets+inputGST)}</span></div>
        </div>
      </div>
      <div class="card pad">
        <h3 style="font-size:15px;margin:0 0 14px">Liabilities &amp; Equity</h3>
        <div class="fin-section">
          <div class="fin-hd">Current Liabilities</div>
          <div class="fin-row"><span>Accounts Payable</span><span class="num">${inr(totalPayable)}</span></div>
          <div class="fin-row"><span>GST Output Liability</span><span class="num">${inr(outputGST)}</span></div>
          <div class="fin-row total"><span>Total Liabilities</span><span class="num">${inr(totalPayable+outputGST)}</span></div>
        </div>
        <div class="fin-section" style="margin-top:14px">
          <div class="fin-hd">Equity</div>
          <div class="fin-row"><span>Retained Earnings (Net Profit)</span><span class="num" style="color:${netProfit>=0?'var(--green)':'var(--red)'}">${inr(netProfit)}</span></div>

  }

  if(t==="tb"){

      "Output GST":{dr:0,cr:saleTax},
      "Purchase (Cost)":{dr:purCost,cr:0},

      "Cash in Hand":{dr:cashBal>0?cashBal:0,cr:cashBal<0?Math.abs(cashBal):0},
      "Bank Balance":{dr:bankBal>0?bankBal:0,cr:bankBal<0?Math.abs(bankBal):0},

    // add party-wise

    const rows=Object.entries(accounts).map(([name,a])=>`<tr>

      <td class="t-r num ${a.dr>0?'tb-row-debit':''}">${a.dr>0?inr(a.dr):'—'}</td>

  const pl=[["Account","Amount"],["Sales Revenue",salesRev],["Purchase Cost",-purCost],["Gross Profit",salesRev-purCost],["Output GST",saleTax],["Input GST",-purTax],["Net GST Payable",saleTax-purTax]];

function docRecalc(){
  const posState=document.getElementById("doc_pos")?document.getElementById("doc_pos").value:document.getElementById("db_state")?.value||"";
  const inter=posState&&db.seller.state&&(posState.trim().toLowerCase()!==db.seller.state.trim().toLowerCase());
  _docDraft.interstate=inter;
  let taxable=0,cgst=0,sgst=0,igst=0,gross=0;
  _docDraft.items.forEach((it,idx)=>{
    const base=(+it.qty||0)*(+it.rate||0);
    const t=base*(1-(+it.disc||0)/100);
    const g=t*(+it.gst||0)/100;
    if(inter)igst+=g;else{cgst+=g/2;sgst+=g/2;}
    taxable+=t;gross+=t+g;
    setText("dit_tot_"+idx,inr(t+g));
  });
  const rounded=Math.round(gross);const roundoff=rounded-gross;
  _docDraft.totals={taxable,cgst,sgst,igst,roundoff,net:rounded};
  const tb=document.getElementById("docTotBox");
  if(tb)tb.innerHTML=`<div class="l">Taxable <b class="num">${inr(taxable)}</b></div>
    ${inter?`<div class="l">IGST <b>${inr(igst)}</b></div>`:`<div class="l">CGST <b>${inr(cgst)}</b></div><div class="l">SGST <b>${inr(sgst)}</b></div>`}

}

function renderCnItems(){
  const prodOpts=p=>`<option value="">Type item…</option>`+db.products.map(x=>`<option value="${x.id}" ${p===x.id?"selected":""}>${esc(x.name)}</option>`).join("");

        <input value="${esc(it.name)}" oninput="setCnItem(${idx},'name',this.value)" style="width:100%"></td>
    <td><input value="${esc(it.hsn||"")}" oninput="setCnItem(${idx},'hsn',this.value)" style="width:65px"></td>
    <td><input type="number" value="${it.qty}" oninput="setCnItem(${idx},'qty',this.value)" style="width:55px;text-align:right"></td>
    <td class="t-r"><input type="number" value="${it.rate}" oninput="setCnItem(${idx},'rate',this.value)" style="width:75px;text-align:right"></td>
    <td class="t-r"><select onchange="setCnItem(${idx},'gst',this.value)" style="width:58px">${[0,5,12,18,28].map(r=>`<option ${it.gst==r?"selected":""}>${r}</option>`).join("")}</select></td>
    <td class="t-r num" id="cit_tot_${idx}">—</td>

function addCnItem(){_cnDraft.items.push(blankItem());renderCnItems();cnRecalc();}
function delCnItem(idx){_cnDraft.items.splice(idx,1);if(!_cnDraft.items.length)_cnDraft.items.push(blankItem());renderCnItems();cnRecalc();}
function setCnItem(idx,f,v){_cnDraft.items[idx][f]=["qty","rate","disc","gst"].includes(f)?(+v||0):v;cnRecalc();}
function pickCnItem(idx,pid){const p=db.products.find(x=>x.id===pid);if(!p)return;Object.assign(_cnDraft.items[idx],{pid,name:p.name,hsn:p.hsn,unit:p.unit,rate:p.sale,gst:p.gst});renderCnItems();cnRecalc();}
function pickCnParty(){const pid=document.getElementById("cn_party").value;if(!pid)return;const p=db.parties.find(x=>x.id===pid);document.getElementById("cn_bname").value=p.name||"";document.getElementById("cn_bstate").value=p.state||"";document.getElementById("cn_bgstin").value=p.gstin||"";cnRecalc();}
function cnRecalc(){
  const st=document.getElementById("cn_bstate")?.value||"";
  const inter=st&&db.seller.state&&(st.toLowerCase()!==db.seller.state.toLowerCase());
  _cnDraft.interstate=inter;
  let taxable=0,cgst=0,sgst=0,igst=0,gross=0;
  _cnDraft.items.forEach((it,idx)=>{
    const t=(+it.qty||0)*(+it.rate||0);const g=t*(+it.gst||0)/100;
    if(inter)igst+=g;else{cgst+=g/2;sgst+=g/2;}
    taxable+=t;gross+=t+g;
    setText("cit_tot_"+idx,inr(t+g));
  });
  const rounded=Math.round(gross);_cnDraft.totals={taxable,cgst,sgst,igst,roundoff:rounded-gross,net:rounded};
  const tb=document.getElementById("cnTotBox");
  if(tb)tb.innerHTML=`<div class="l">Taxable <b>${inr(taxable)}</b></div>
    ${inter?`<div class="l">IGST <b>${inr(igst)}</b></div>`:`<div class="l">CGST <b>${inr(cgst)}</b></div><div class="l">SGST <b>${inr(sgst)}</b></div>`}
    <div class="l grand">Note Amount <b class="num">${inr(rounded)}</b></div>`;
}
function saveCn(){
  _cnDraft.number=document.getElementById("cn_no").value.trim();
  _cnDraft.date=document.getElementById("cn_date").value;
  _cnDraft.againstInvoice=document.getElementById("cn_inv").value.trim();
  _cnDraft.reason=document.getElementById("cn_reason").value.trim();
  _cnDraft.buyer.name=document.getElementById("cn_bname").value.trim();
  _cnDraft.buyer.state=document.getElementById("cn_bstate").value;
  _cnDraft.buyer.gstin=document.getElementById("cn_bgstin").value.toUpperCase();
  _cnDraft.buyer.partyId=document.getElementById("cn_party").value;
  if(!_cnDraft.buyer.name){toast("Party name required");return;}
  cnRecalc();
  if(!db.credNotes)db.credNotes=[];
  const isNew=!db.credNotes.some(x=>x.id===_cnDraft.id);
  // Update party ledger
  const isCredit=_cnDraft.noteType==="credit";
  if(_cnDraft.buyer.partyId){
    db.vouchers.push({id:id(),type:"manual",date:_cnDraft.date,partyId:_cnDraft.buyer.partyId,
      dr:isCredit?0:_cnDraft.totals.net,cr:isCredit?_cnDraft.totals.net:0,
      narration:`${isCredit?"Credit":"Debit"} Note ${_cnDraft.number}${_cnDraft.againstInvoice?" against "+_cnDraft.againstInvoice:""}`,mode:"manual",linkLedger:true});
  }
  // Return stock on credit note
  if(isCredit){
    _cnDraft.items.forEach(it=>{const p=db.products.find(x=>x.id===it.pid);if(p)p.stock+=Number(it.qty)||0;});
  }
  if(isNew)db.credNotes.push(JSON.parse(JSON.stringify(_cnDraft)));
  else{const i=db.credNotes.findIndex(x=>x.id===_cnDraft.id);db.credNotes[i]=JSON.parse(JSON.stringify(_cnDraft));}
  saveDB();closeModal();renderCredNotes();toast("Note saved — party ledger updated ✓");
}
function delCredNote(cid){
  if(!confirm("Delete this note? Ledger entry will NOT be auto-reversed."))return;
  db.credNotes=(db.credNotes||[]).filter(x=>x.id!==cid);saveDB();renderCredNotes();toast("Deleted");
}

/* =========================================================================
   PAYMENT REMINDERS
   ========================================================================= */
function renderReminders(){
  setActions(`<button class="btn primary" onclick="sendBulkReminders()">📨 Send All Overdue Reminders</button>`);
  const now=new Date();
  // gather all overdue invoices
  const overdue=[];
  db.invoices.forEach(i=>{
    const due=Math.max(0,i.totals.net-(i.paid||0));
    if(due<1)return;
    const days=Math.floor((now-new Date(i.date))/86400000);
    const party=db.parties.find(p=>p.id===i.buyer.partyId);
    const creditDays=party?.creditDays||0;
    const overdueDays=Math.max(0,days-creditDays);
    overdue.push({inv:i,party,due,days,overdueDays});
  });
  overdue.sort((a,b)=>b.overdueDays-a.overdueDays);

  const now30=overdue.filter(x=>x.overdueDays>0&&x.overdueDays<=30);
  const now60=overdue.filter(x=>x.overdueDays>30&&x.overdueDays<=60);
  const now90p=overdue.filter(x=>x.overdueDays>60);
  const upcoming=overdue.filter(x=>x.overdueDays<=0&&x.days<(db.parties.find(p=>p.id===x.inv.buyer.partyId)?.creditDays||30));

  function bucket(title,items,color){
    if(!items.length)return"";
    return`<div class="card pad" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <span class="tag ${color}" style="font-size:13px">${title}</span>
        <span style="font-size:12px;color:var(--muted)">${items.length} invoices · ${inr(items.reduce((s,x)=>s+x.due,0))}</span>
      </div>
      <table><thead><tr><th>Invoice #</th><th>Date</th><th>Party</th><th>Phone</th><th class="t-r">Due</th><th class="t-r">Overdue by</th><th></th></tr></thead><tbody>
      ${items.map(({inv,party,due,overdueDays})=>`<tr>
        <td><b>${esc(inv.number)}</b></td><td class="num">${fmtDate(inv.date)}</td>
        <td>${esc(inv.buyer.name)}</td><td class="num">${esc(inv.buyer.phone||party?.phone||"—")}</td>
        <td class="t-r num"><b>${inr(due)}</b></td>
        <td class="t-r">${overdueDays>0?`<span class="overdue-badge">⏰ ${overdueDays}d overdue</span>`:""}</td>
        <td class="t-r">
          <button class="btn sm" onclick="sendReminderWA('${inv.id}')">📱 WA</button>
          <button class="btn sm" onclick="sendReminderEmail('${inv.id}')">✉ Email</button>
        </td></tr>`).join("")}
      </tbody></table></div>`;
  }

  document.getElementById("view").innerHTML=`
    <div class="kpis" style="margin-bottom:16px">
      <div class="kpi"><div class="lbl"><span class="dot" style="background:var(--red)"></span>Total Overdue</div><div class="val num">${inr(overdue.reduce((s,x)=>s+x.due,0))}</div><div class="sub">${overdue.length} invoices</div></div>
      <div class="kpi"><div class="lbl"><span class="dot" style="background:var(--accent)"></span>60+ Days Overdue</div><div class="val num">${inr(now90p.reduce((s,x)=>s+x.due,0))}</div><div class="sub">${now90p.length} invoices</div></div>
      <div class="kpi"><div class="lbl"><span class="dot" style="background:var(--green)"></span>Upcoming (within credit)</div><div class="val num">${inr(upcoming.reduce((s,x)=>s+x.due,0))}</div><div class="sub">${upcoming.length} invoices</div></div>
    </div>
    ${overdue.length===0?`<div class="card pad">${emptyBox("🎉","No overdue invoices","All your invoices are within credit period or paid. Great going!")}</div>`:""}
    ${bucket("🔴 90+ Days Overdue",now90p,"red")}
    ${bucket("🟡 31–60 Days Overdue",now60,"amber")}
    ${bucket("🟢 1–30 Days Overdue",now30,"green")}`;
}
function sendReminderWA(invId){
  const i=db.invoices.find(x=>x.id===invId);
  const due=Math.max(0,i.totals.net-(i.paid||0));
  const days=Math.floor((new Date()-new Date(i.date))/86400000);
  const msg=`Dear ${i.buyer.name},\n\nThis is a gentle reminder regarding your outstanding payment:\n\n📄 Invoice: ${i.number}\n📅 Date: ${fmtDate(i.date)}\n💰 Amount Due: ${inr(due)}\n⏰ Days Outstanding: ${days} days\n\nKindly arrange payment at your earliest convenience.\n\nThank you,\n${db.seller.name}\n${db.seller.phone||""}`;
  const ph=(i.buyer.phone||"").replace(/\D/g,"");
  window.open(`https://wa.me/${ph?"91"+ph:""}?text=`+encodeURIComponent(msg),"_blank");
}
function sendReminderEmail(invId){
  const i=db.invoices.find(x=>x.id===invId);
  const due=Math.max(0,i.totals.net-(i.paid||0));
  const sub=`Payment Reminder: Invoice ${i.number} — ${inr(due)} Due`;
  const body=`Dear ${i.buyer.name},\n\nThis is a reminder for invoice ${i.number} dated ${fmtDate(i.date)}.\nAmount due: ${inr(due)}\n\nPlease arrange payment at the earliest.\n\nRegards,\n${db.seller.name}`;
  window.open(`mailto:${i.buyer.email||""}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`);
}
function sendBulkReminders(){
  const now=new Date();
  const overdue=db.invoices.filter(i=>{const d=Math.max(0,i.totals.net-(i.paid||0));return d>0.5&&Math.floor((now-new Date(i.date))/86400000)>0;});
  if(!overdue.length){toast("No overdue invoices");return;}
  if(!confirm(`Send WhatsApp reminders for ${overdue.length} overdue invoices?`))return;
  overdue.forEach((inv,idx)=>setTimeout(()=>sendReminderWA(inv.id),idx*800));
  toast(`Opening ${overdue.length} WhatsApp reminders…`);
}

// Check and generate due recurring on load
function checkRecurring(){
  if(!db.recurring)return;
  const t=today();
  db.recurring.filter(r=>r.active&&r.nextDate<=t).forEach(r=>{
    if(!db.invoices.some(i=>i.recurringId===r.id&&i.date===r.nextDate)){
      const inv={id:id(),number:nextInvNo(),date:r.nextDate,due:"",placeOfSupply:db.seller.state,
        reverse:"No",eway:"",vehicle:"",template:r.template||"classic",
        buyer:{...r.buyer},items:r.items.map(it=>({...it})),paid:0,interstate:r.interstate||false,linkLedger:true,
        totals:{...r.totals},recurringId:r.id,isDraft:true};
      db.invoices.push(inv);
      if(inv.number===nextInvNo())db.invCounter++;else db.invCounter++;
    }
    // advance next date
    const d=new Date(r.nextDate);
    if(r.frequency==="monthly")d.setMonth(d.getMonth()+1);
    else if(r.frequency==="quarterly")d.setMonth(d.getMonth()+3);
    else if(r.frequency==="weekly")d.setDate(d.getDate()+7);
    r.nextDate=d.toISOString().slice(0,10);
    r.occurrencesRun=(r.occurrencesRun||0)+1;
    if(r.maxOccurrences&&r.occurrencesRun>=r.maxOccurrences)r.active=false;
  });
  saveDB();
}

  setActions(`<button class="btn primary" onclick="recurringForm()">＋ New Recurring Schedule</button>`);
  if(!db.recurring)db.recurring=[];

     <div class="field"><label>Party</label><select id="rec_party">${partyOpts}</select></div>
     <div class="field"><label>Frequency</label><select id="rec_freq">
       <option value="monthly">Monthly</option>

function prefillRecurring(invId){
  if(!invId)return;
  const inv=db.invoices.find(x=>x.id===invId);if(!inv)return;
  document.getElementById("rec_party").value=inv.buyer.partyId||"";
  document.getElementById("rec_amount").value=inv.totals.net;
  toast("Pre-filled from invoice");
}
function saveRecurring(){
  if(!db.recurring)db.recurring=[];
  const name=document.getElementById("rec_name").value.trim();
  if(!name){toast("Schedule name required");return;}
  const partyId=document.getElementById("rec_party").value;
  const party=db.parties.find(x=>x.id===partyId)||{};
  const freq=document.getElementById("rec_freq").value;
  const start=document.getElementById("rec_start").value;
  const max=+document.getElementById("rec_max").value||0;
  const amount=+document.getElementById("rec_amount").value||0;
  // try to get items from selected invoice
  const invId=document.getElementById("rec_fromInv")?.value||"";
  const srcInv=invId?db.invoices.find(x=>x.id===invId):null;
  db.recurring.push({id:id(),name,buyer:{partyId,name:party.name||"",address:party.address||"",gstin:party.gstin||"",state:party.state||"",stateCode:party.stateCode||"",phone:party.phone||"",email:party.email||""},
    frequency:freq,nextDate:start,maxOccurrences:max,active:true,occurrencesRun:0,
    items:srcInv?srcInv.items.map(it=>({...it})):[blankItem()],
    interstate:srcInv?.interstate||false,template:srcInv?.template||"classic",
    totals:srcInv?{...srcInv.totals}:{taxable:amount,cgst:0,sgst:0,igst:0,roundoff:0,net:amount}});
  saveDB();closeModal();renderRecurring();toast("Recurring schedule saved");
}
function toggleRecurring(rid){const r=db.recurring.find(x=>x.id===rid);if(r)r.active=!r.active;saveDB();renderRecurring();toast(r.active?"Resumed":"Paused");}
function delRecurring(rid){if(!confirm("Delete this schedule?"))return;db.recurring=(db.recurring||[]).filter(x=>x.id!==rid);saveDB();renderRecurring();toast("Deleted");}

function buildEwayObj(invId){

    taxableAmount:+(((+it.qty)*(+it.rate)*(1-(+it.disc||0)/100)).toFixed(2)),
    cgstRate:i.interstate?0:(+it.gst||0)/2,sgstRate:i.interstate?0:(+it.gst||0)/2,
    igstRate:i.interstate?(+it.gst||0):0

  return {
    supplyType:"O",subSupplyType:1,docType:"INV",
    docNo:i.number,docDate:i.date,
    fromGstin:s.gstin||"",fromTrdName:s.name||"",
    fromAddr1:s.address||"",fromAddr2:s.city||"",
    fromPlace:s.city||"",fromPincode:"",fromStateCode:s.stateCode||"",
    toGstin:b.gstin||"URP",toTrdName:b.name||"",
    toAddr1:b.address||"",toAddr2:"",toPlace:b.state||"",
    toPincode:"",toStateCode:b.stateCode||"",

    cgstValue:i.totals.cgst,sgstValue:i.totals.sgst,igstValue:i.totals.igst,
    cessValue:0,totInvValue:i.totals.net,
    transMode:"1",transDistance:"",
    transporterName:"",transporterId:"",
    transDocNo:i.eway||"",transDocDate:i.date,
    vehicleNo:i.vehicle||"",vehicleType:"R",
    itemList:items
  };
}
function viewEwayJSON(invId){

function posSearch(q){
  q=q.trim().toLowerCase();
  const el=document.getElementById("posSuggestions");
  if(!q){el.innerHTML="";return;}
  const matches=db.products.filter(p=>p.name.toLowerCase().includes(q)||p.barcode===q||(p.sku||"").toLowerCase().includes(q)).slice(0,5);
  // If exact barcode match, add immediately
  if(db.products.some(p=>p.barcode===q)){
    const p=db.products.find(x=>x.barcode===q);
    addToCartById(p.id);
    document.getElementById("posInput").value="";
    el.innerHTML="";
    return;
  }
  el.innerHTML=matches.length?`<div style="border:1px solid var(--line);border-radius:8px;overflow:hidden">
    ${matches.map(p=>`<div onclick="addToCartById('${p.id}');document.getElementById('posInput').value='';document.getElementById('posSuggestions').innerHTML=''"
      style="padding:9px 14px;cursor:pointer;display:flex;justify-content:space-between;border-bottom:1px solid var(--line-2);font-size:13px"
      onmouseover="this.style.background='var(--line-2)'" onmouseout="this.style.background=''">
      <span><b>${esc(p.name)}</b> <span style="color:var(--muted);font-size:11px">${esc(p.sku||"")}</span></span>
      <span style="color:var(--green);font-weight:700">${inr(p.sale)}</span>
    </div>`).join("")}
  </div>`:"";
}
function addToCartFromSearch(){
  const q=document.getElementById("posInput").value.trim().toLowerCase();
  const p=db.products.find(x=>x.name.toLowerCase()===q||x.barcode===q||(x.sku||"").toLowerCase()===q);
  if(p){addToCartById(p.id);document.getElementById("posInput").value="";document.getElementById("posSuggestions").innerHTML="";}
  else toast("Product not found — try a different name or barcode");
}
function addToCartById(pid){
  const p=db.products.find(x=>x.id===pid);if(!p)return;
  const existing=_posCart.find(x=>x.pid===pid);
  if(existing)existing.qty++;
  else _posCart.push({pid,name:p.name,hsn:p.hsn,unit:p.unit,rate:p.sale,gst:p.gst,qty:1,disc:0});
  renderPOSCart();
  toast(`Added: ${p.name}`);
}
function renderPOSCart(){
  const cd=document.getElementById("posCartDiv");
  const td=document.getElementById("posTotDiv");
  if(!cd||!td)return;
  if(!_posCart.length){cd.innerHTML=`<div class="empty" style="padding:20px">🛒<br>Cart is empty</div>`;td.innerHTML="";return;}
  let taxable=0,cgst=0,sgst=0,gross=0;
  cd.innerHTML=`<table style="width:100%;font-size:12.5px"><tbody>
    ${_posCart.map((it,idx)=>{
      const t=(+it.qty||0)*(+it.rate||0);const g=t*(+it.gst||0)/100;
      taxable+=t;cgst+=g/2;sgst+=g/2;gross+=t+g;
      return `<tr><td style="padding:5px 0"><b>${esc(it.name)}</b><br><span style="color:var(--muted);font-size:11px">${inr(it.rate)} × </span></td>
        <td style="width:80px;padding:0 6px"><input type="number" value="${it.qty}" min="1"
          oninput="setPOSQty(${idx},this.value)" style="width:60px;text-align:center;padding:5px;border:1px solid var(--line);border-radius:6px"></td>
        <td style="text-align:right;font-weight:700;padding:5px 0">${inr(t+g)}</td>
        <td style="width:28px"><button class="delrow" onclick="removePOSItem(${idx})">×</button></td></tr>`;
    }).join("")}
  </tbody></table>`;
  const net=Math.round(gross);
  const received=+document.getElementById("posReceived")?.value||0;
  const change=received-net;
  td.innerHTML=`<div class="l"><span>Taxable</span><b>${inr(taxable)}</b></div>
    <div class="l"><span>GST</span><b>${inr(cgst+sgst)}</b></div>
    <div class="l grand"><span>Total</span><b>${inr(net)}</b></div>
    ${received>0?`<div class="l" style="color:var(--muted)"><span>Received</span><b>${inr(received)}</b></div>
    <div class="l" style="color:${change>=0?"var(--green)":"var(--red)"}"><span>Change</span><b>${inr(Math.abs(change))} ${change>=0?"Return":"Due"}</b></div>`:""}`;
}
function setPOSQty(idx,v){if(!_posCart[idx])return;_posCart[idx].qty=+v||1;renderPOSCart();}
function removePOSItem(idx){_posCart.splice(idx,1);renderPOSCart();}
function clearPOSCart(){if(_posCart.length&&!confirm("Clear the cart?"))return;_posCart=[];renderPOSCart();}
function checkoutPOS(){
  if(!_posCart.length){toast("Cart is empty");return;}
  if(!db.seller.gstin||!validGSTIN(db.seller.gstin)){toast("Set valid GSTIN in Business Profile");go("settings");return;}
  const partyEl=document.getElementById("posParty");
  const partyId=partyEl?partyEl.value:"";
  const party=partyId?db.parties.find(x=>x.id===partyId):{};
  const received=+document.getElementById("posReceived")?.value||0;
  let taxable=0,cgst=0,sgst=0,gross=0;
  _posCart.forEach(it=>{const t=(+it.qty)*(+it.rate);const g=t*(+it.gst)/100;taxable+=t;cgst+=g/2;sgst+=g/2;gross+=t+g;});
  const net=Math.round(gross);
  draft={id:id(),number:nextInvNo(),date:today(),due:"",placeOfSupply:db.seller.state,
    reverse:"No",eway:"",vehicle:"",template:"classic",
    buyer:{partyId,name:party?.name||"Walk-in Customer",address:party?.address||"",gstin:party?.gstin||"",pan:party?.pan||"",state:party?.state||db.seller.state,stateCode:party?.stateCode||db.seller.stateCode,phone:party?.phone||"",email:party?.email||""},
    items:_posCart.map(it=>({...it})),discountIsPct:true,paid:received,interstate:false,linkLedger:true,
    totals:{taxable,cgst,sgst,igst:0,roundoff:net-gross,net}};
  // Deduct stock
  _posCart.forEach(it=>{const p=db.products.find(x=>x.id===it.pid);if(p)p.stock-=Number(it.qty)||0;});
  db.invoices.push(JSON.parse(JSON.stringify(draft)));
  if(draft.number===nextInvNo())db.invCounter++;else db.invCounter++;
  saveDB();
  _posCart=[];
  toast("Invoice created from cart");
  go("invoices");
  setTimeout(()=>viewInvoice(draft.id),100);
}

function renderGSTR2B(){
  setActions(`<button class="btn primary" onclick="document.getElementById('gstr2bFile').click()">⭱ Upload GSTR-2B JSON</button>
              <input type="file" id="gstr2bFile" accept=".json" style="display:none" onchange="loadGSTR2B(this)">`);
  document.getElementById("view").innerHTML=`
   <div class="card pad" style="margin-bottom:16px">
     <div class="sectit">How to reconcile GSTR-2B</div>
     <ol style="font-size:13px;color:var(--text);padding-left:18px;line-height:2;margin:0">
       <li>Log in to <a href="https://www.gst.gov.in" target="_blank">GST Portal</a> → Returns → GSTR-2B</li>
       <li>Download the JSON file for the relevant month</li>
       <li>Click <b>Upload GSTR-2B JSON</b> above</li>
       <li>Review matched, mismatched and missing invoices below</li>
     </ol>
   </div>
   <div id="gstr2bResult">${emptyBox("✅","Upload GSTR-2B JSON to reconcile","Your purchase bills will be matched against GSTN portal data automatically.")}</div>`;
}
function loadGSTR2B(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      // GSTR-2B JSON typically has data.data.docdata.b2b array
      const b2b=(data?.data?.docdata?.b2b||data?.docdata?.b2b||data?.b2b||[]);
      // Flatten all invoices from GSTR-2B
      const portalInvs=[];
      b2b.forEach(supplier=>{
        (supplier.inv||[]).forEach(inv=>{
          portalInvs.push({
            supplierGstin:supplier.ctin||supplier.gstin||"",
            invoiceNo:inv.inum||inv.docNo||"",
            invoiceDate:inv.idt||inv.docDt||"",
            taxableValue:inv.val||inv.taxval||0,
            igst:inv.itc?.igst||inv.igst||0,
            cgst:inv.itc?.cgst||inv.cgst||0,
            sgst:inv.itc?.sgst||inv.sgst||0,
            totalTax:(inv.itc?.igst||inv.igst||0)+(inv.itc?.cgst||inv.cgst||0)+(inv.itc?.sgst||inv.sgst||0)
          });
        });
      });
      // Our purchase records
      const ourPurch=(db.purchaseInvoices||[]);
      const matched=[],mismatched=[],onlyPortal=[],onlyOurs=[];
      // Match by GSTIN + invoice number
      portalInvs.forEach(pi=>{
        const ours=ourPurch.find(p=>(p.supplierGstin||"").toUpperCase()===(pi.supplierGstin||"").toUpperCase()&&(p.billNo||"").toUpperCase()===(pi.invoiceNo||"").toUpperCase());
        if(ours){
          const ourTax=(ours.totals?.cgst||0)+(ours.totals?.sgst||0)+(ours.totals?.igst||0);
          const diff=Math.abs(ourTax-pi.totalTax);
          if(diff<1)matched.push({portal:pi,ours});
          else mismatched.push({portal:pi,ours,diff});
        } else {
          onlyPortal.push(pi);
        }
      });
      ourPurch.forEach(p=>{
        const found=portalInvs.some(pi=>(pi.supplierGstin||"").toUpperCase()===(p.supplierGstin||"").toUpperCase()&&(pi.invoiceNo||"").toUpperCase()===(p.billNo||"").toUpperCase());
        if(!found)onlyOurs.push(p);
      });
      const totalMatchedITC=matched.reduce((s,x)=>s+x.portal.totalTax,0);
      const totalMismatchedITC=mismatched.reduce((s,x)=>s+x.portal.totalTax,0);
      const missedITC=onlyPortal.reduce((s,x)=>s+x.totalTax,0);
      document.getElementById("gstr2bResult").innerHTML=`
        <div class="kpis" style="margin-bottom:16px">
          <div class="kpi"><div class="lbl"><span class="dot" style="background:var(--green)"></span>Matched</div><div class="val">${matched.length}</div><div class="sub num">${inr(totalMatchedITC)} ITC</div></div>
          <div class="kpi"><div class="lbl"><span class="dot" style="background:var(--accent)"></span>Mismatched</div><div class="val">${mismatched.length}</div><div class="sub num">${inr(totalMismatchedITC)} ITC</div></div>
          <div class="kpi"><div class="lbl"><span class="dot" style="background:var(--red)"></span>Only in Portal (missing in books)</div><div class="val">${onlyPortal.length}</div><div class="sub num">${inr(missedITC)} ITC potentially missed</div></div>
          <div class="kpi"><div class="lbl"><span class="dot" style="background:var(--muted)"></span>Only in Books (not on portal)</div><div class="val">${onlyOurs.length}</div><div class="sub">Need supplier to file returns</div></div>
        </div>
        ${mismatched.length?`<div class="card pad" style="margin-bottom:14px">
          <div class="sectit" style="color:var(--accent)">⚠ Mismatched Tax Amounts</div>
          <table><thead><tr><th>Supplier GSTIN</th><th>Bill No.</th><th>Portal Tax</th><th>Your Records</th><th class="t-r">Difference</th></tr></thead><tbody>
            ${mismatched.map(({portal,ours,diff})=>`<tr>
              <td class="num">${esc(portal.supplierGstin)}</td><td>${esc(portal.invoiceNo)}</td>
              <td class="num" style="color:var(--green)">${inr(portal.totalTax)}</td>
              <td class="num" style="color:var(--red)">${inr((ours.totals?.cgst||0)+(ours.totals?.sgst||0)+(ours.totals?.igst||0))}</td>
              <td class="t-r num"><span class="tag amber">Δ ${inr(diff)}</span></td></tr>`).join("")}
          </tbody></table></div>`:""}
        ${onlyPortal.length?`<div class="card pad" style="margin-bottom:14px">
          <div class="sectit" style="color:var(--red)">🔴 In Portal but missing from your books</div>
          <table><thead><tr><th>Supplier GSTIN</th><th>Invoice No.</th><th>Date</th><th class="t-r">ITC Available</th></tr></thead><tbody>
            ${onlyPortal.map(p=>`<tr><td class="num">${esc(p.supplierGstin)}</td><td>${esc(p.invoiceNo)}</td><td class="num">${esc(p.invoiceDate)}</td><td class="t-r num" style="color:var(--red)"><b>${inr(p.totalTax)}</b></td></tr>`).join("")}
          </tbody></table></div>`:""}
        ${onlyOurs.length?`<div class="card pad">
          <div class="sectit" style="color:var(--muted)">🔵 In your books but not on portal</div>
          <table><thead><tr><th>Supplier</th><th>Bill No.</th><th>Date</th><th class="t-r">Your ITC Claim</th></tr></thead><tbody>
            ${onlyOurs.map(p=>`<tr><td>${esc(p.supplierName||"")}</td><td>${esc(p.billNo||"")}</td><td class="num">${fmtDate(p.date)}</td><td class="t-r num">${inr((p.totals?.cgst||0)+(p.totals?.sgst||0)+(p.totals?.igst||0))}</td></tr>`).join("")}
          </tbody></table></div>`:""}
        ${matched.length?`<div style="margin-top:12px;padding:12px 16px;background:var(--green-bg);border-radius:10px;color:var(--green);font-weight:600">
          ✓ ${matched.length} invoices matched correctly — ${inr(totalMatchedITC)} ITC confirmed
        </div>`:""}`;
      toast(`GSTR-2B loaded: ${portalInvs.length} portal invoices`);
    }catch(err){
      document.getElementById("gstr2bResult").innerHTML=`<div class="card pad"><div class="empty">❌ Invalid GSTR-2B JSON file<br><span style="font-size:12px;color:var(--muted)">Please download the JSON from GST portal (not Excel/PDF)</span></div></div>`;
      toast("Could not parse GSTR-2B file");
    }
    input.value="";
  };
  reader.readAsText(file);
}
